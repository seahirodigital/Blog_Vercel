name: Blog Pipeline - YouTube → AI → OneDrive

on:
  # AppSheetからの外部トリガー（Webhook検知用）
  repository_dispatch:
    types: [trigger-from-appsheet]

  # 定時実行 (毎日 JST 9:00 = UTC 0:00)
  schedule:
    - cron: '0 0 * * *'

  # 手動トリガー（Vercel UIからのAPI経由 or GitHub UIから）
  workflow_dispatch:
    inputs:
      mode:
        description: '実行モード'
        required: false
        default: 'batch'
        type: choice
        options:
          - batch
          - single
      source_type:
        description: '入力ソース種別（amazon指定時はsource_urlsを直接処理）'
        required: false
        default: ''
      source_urls:
        description: '直接処理するURL配列(JSON)または改行区切りURL'
        required: false
        default: ''
      status:
        description: 'Gemini writer prompt status'
        required: false
        default: '単品'

jobs:
  generate-blog:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Python 3.13 セットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Python 依存パッケージをインストール
        run: pip install -r scripts/pipeline/requirements.txt

      - name: Playwright Chromium ブラウザをインストール
        run: playwright install --with-deps chromium

      - name: ブログ生成パイプラインを実行
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID }}
          SHEET_NAME: ${{ secrets.SHEET_NAME }}
          APIFY_API_KEY: ${{ secrets.APIFY_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_TOKEN_sub: ${{ secrets.GEMINI_TOKEN_SUB }}
          GEMINI_TOKEN_SUB2: ${{ secrets.GEMINI_TOKEN_SUB2 }}
          GEMINI_TOKEN_SUB3: ${{ secrets.GEMINI_TOKEN_SUB3 }}
          ONEDRIVE_CLIENT_ID: ${{ secrets.ONEDRIVE_CLIENT_ID }}
          ONEDRIVE_CLIENT_SECRET: ${{ secrets.ONEDRIVE_CLIENT_SECRET }}
          ONEDRIVE_REFRESH_TOKEN: ${{ secrets.ONEDRIVE_REFRESH_TOKEN }}
          ONEDRIVE_FOLDER: ${{ secrets.ONEDRIVE_FOLDER }}
          GH_PAT: ${{ secrets.GH_PAT }}
          GITHUB_REPO: ${{ github.repository }}
          VERCEL_URL: https://blog-vercel-dun.vercel.app
          GOOGLE_CSE_API_KEY: ${{ secrets.GOOGLE_CSE_API_KEY }}
          GOOGLE_CSE_CX: ${{ secrets.GOOGLE_CSE_CX }}
          AMAZON_CLIENT_ID: ${{ secrets.AMAZON_CLIENT_ID }}
          AMAZON_CLIENT_SECRET: ${{ secrets.AMAZON_CLIENT_SECRET }}
          INPUT_MODE: ${{ github.event.inputs.mode || 'batch' }}
          INPUT_SOURCE_TYPE: ${{ github.event.inputs.source_type || '' }}
          INPUT_SOURCE_URLS: ${{ github.event.inputs.source_urls || '' }}
          INPUT_STATUS: ${{ github.event.inputs.status || '単品' }}
        working-directory: scripts/pipeline
        run: python main.py
