name: Note 公開投稿 予約監視セッション

# このファイルは予約一覧から自動生成します。
# 1回起動した監視ジョブが、セッション中に定期確認して対象予約を起動します。

on:
  workflow_dispatch:
  schedule:
    - cron: '55 1 10 7 *'
    - cron: '55 6 10 7 *'
    - cron: '55 11 10 7 *'
    - cron: '10 17 10 7 *'
    - cron: '10 22 10 7 *'
    - cron: '25 3 11 7 *'
    - cron: '25 8 11 7 *'
    - cron: '25 13 11 7 *'
    - cron: '40 19 11 7 *'
    - cron: '55 0 12 7 *'
    - cron: '55 5 12 7 *'
    - cron: '55 10 12 7 *'

jobs:
  dispatch-reserved-posts:
    runs-on: ubuntu-latest
    timeout-minutes: 340
    concurrency:
      group: note-post-reservation-dispatch
      cancel-in-progress: false
    permissions:
      actions: write
      contents: write
    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: 予約時刻が近い投稿ジョブを監視して起動
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
          GITHUB_TOKEN: ${{ github.token }}
          NOTE_POST_SCHEDULE_SOURCE: github-reservation-monitor
          NOTE_POST_QUEUE_STALE_MINUTES: "90"
          NOTE_POST_PRESTART_WINDOW_MINUTES: "35"
          NOTE_POST_LATE_GRACE_MINUTES: "720"
          NOTE_POST_MONITOR_MODE: "true"
          NOTE_POST_MONITOR_DURATION_MINUTES: "330"
          NOTE_POST_MONITOR_POLL_SECONDS: "60"
        run: python .github/scripts/note_post_schedule_dispatch.py
