name: Note 公開投稿 予約監視バックアップ

on:
  schedule:
    - cron: '2-59/5 * * * *'
  workflow_dispatch:

jobs:
  backup-schedule-watch:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    concurrency:
      group: note-post-schedule-dispatch
      cancel-in-progress: false
    permissions:
      actions: write
      contents: write
    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: GitHub上の予約ファイルをバックアップ監視する
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
          GITHUB_TOKEN: ${{ github.token }}
          NOTE_POST_SCHEDULE_SOURCE: github-backup-schedule
          NOTE_POST_QUEUE_STALE_MINUTES: "90"
        run: python .github/scripts/note_post_schedule_dispatch.py
