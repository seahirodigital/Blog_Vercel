name: Note 公開投稿 予約監視バックアップ

on:
  schedule:
    - cron: '2-59/5 * * * *'
  workflow_dispatch:

jobs:
  call-note-post-cron:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - name: 期限到来予約をバックアップ監視する
        env:
          VERCEL_URL: https://blog-vercel-dun.vercel.app
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          python - <<'PY'
          import os
          import urllib.error
          import urllib.request

          base_url = os.environ.get('VERCEL_URL', 'https://blog-vercel-dun.vercel.app').rstrip('/')
          cron_url = f'{base_url}/api/note-post-cron?source=github-backup-schedule'
          secret = os.environ.get('CRON_SECRET', '') or os.environ.get('GH_PAT', '')
          headers = {
              'Accept': 'application/json',
              'User-Agent': 'github-actions-note-post-backup-schedule',
          }
          if secret:
              headers['Authorization'] = f'Bearer {secret}'

          req = urllib.request.Request(cron_url, method='GET', headers=headers)
          try:
              with urllib.request.urlopen(req, timeout=60) as response:
                  print(response.read().decode('utf-8'))
          except urllib.error.HTTPError as error:
              body = error.read().decode('utf-8')
              print(f'Cronエンドポイント呼び出し失敗: HTTP {error.code} {body[:1000]}')
              raise
          PY
