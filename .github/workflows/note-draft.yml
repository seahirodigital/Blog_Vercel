name: Note 下書き投稿 - OneDrive → note.com

on:
  workflow_dispatch:
    inputs:
      file_id:
        description: 'OneDrive上の記事ファイルID'
        required: true
        type: string

jobs:
  post-to-note:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Python 3.13 セットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Python 依存パッケージをインストール
        run: pip install -r scripts/pipeline/requirements.txt

      - name: Playwright ブラウザをインストール（Chromium）
        run: playwright install --with-deps chromium

      - name: Adobe browser state Secret を確認
        env:
          ADOBE_EXPRESS_STORAGE_STATE: ${{ secrets.ADOBE_EXPRESS_STORAGE_STATE }}
        run: |
          python -c "
          import json, os, sys

          raw = os.environ.get('ADOBE_EXPRESS_STORAGE_STATE', '').strip()
          if not raw:
              raise SystemExit('ADOBE_EXPRESS_STORAGE_STATE secret が未設定です。ローカルと同じ browser state で再現できません。')
          try:
              json.loads(raw)
          except Exception as exc:
              raise SystemExit(f'ADOBE_EXPRESS_STORAGE_STATE secret の JSON が不正です: {exc}')
          print('✅ ADOBE_EXPRESS_STORAGE_STATE secret を確認しました')
          "

      - name: OneDriveから記事を取得し note に下書き投稿
        env:
          ONEDRIVE_CLIENT_ID: ${{ secrets.ONEDRIVE_CLIENT_ID }}
          ONEDRIVE_CLIENT_SECRET: ${{ secrets.ONEDRIVE_CLIENT_SECRET }}
          ONEDRIVE_REFRESH_TOKEN: ${{ secrets.ONEDRIVE_REFRESH_TOKEN }}
          NOTE_EMAIL: ${{ secrets.NOTE_EMAIL }}
          NOTE_PASSWORD: ${{ secrets.NOTE_PASSWORD }}
          NOTE_STORAGE_STATE: ${{ secrets.NOTE_STORAGE_STATE }}
          ADOBE_EXPRESS_STORAGE_STATE: ${{ secrets.ADOBE_EXPRESS_STORAGE_STATE }}
          AMAZON_CLIENT_ID: ${{ secrets.AMAZON_CLIENT_ID }}
          AMAZON_CLIENT_SECRET: ${{ secrets.AMAZON_CLIENT_SECRET }}
          APIFY_API_KEY: ${{ secrets.APIFY_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}
          FILE_ID: ${{ inputs.file_id }}
        working-directory: scripts/pipeline
        run: |
          python -c "
          import requests, os

          token_res = requests.post('https://login.microsoftonline.com/common/oauth2/v2.0/token', data={
              'client_id': os.environ['ONEDRIVE_CLIENT_ID'],
              'client_secret': os.environ['ONEDRIVE_CLIENT_SECRET'],
              'refresh_token': os.environ['ONEDRIVE_REFRESH_TOKEN'],
              'grant_type': 'refresh_token',
              'scope': 'Files.ReadWrite.All offline_access',
          })
          token = token_res.json()['access_token']
          file_id = os.environ['FILE_ID']
          content_res = requests.get(
              f'https://graph.microsoft.com/v1.0/me/drive/items/{file_id}/content',
              headers={'Authorization': f'Bearer {token}'}
          )
          content_res.raise_for_status()
          with open('/tmp/article.md', 'w', encoding='utf-8') as f:
              f.write(content_res.text)
          print(f'✅ 記事取得完了: {len(content_res.text)} 文字')
          "

          python prompts/05-draft-manager/note_draft_poster.py /tmp/article.md

      - name: note画像アップロード調査artifactを保存
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: note-top-image-artifacts-${{ github.run_id }}
          path: scripts/pipeline/debug/note_gazo_test/artifacts
          if-no-files-found: warn
