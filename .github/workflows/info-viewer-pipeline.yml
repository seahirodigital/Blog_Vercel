name: Info Viewer Pipeline

on:
  schedule:
    - cron: "15 18 * * *"
  workflow_dispatch:
    inputs:
      max_items:
        description: "今回処理する最大件数"
        required: false
        default: "5"
      channel_name:
        description: "特定チャンネルだけを処理する場合のチャンネル名"
        required: false
        default: ""
      video_url:
        description: "単一動画だけを処理する場合の URL"
        required: false
        default: ""
      rebuild_manifest_only:
        description: "記事生成をせず manifest だけを再構築する"
        required: false
        type: boolean
        default: false

jobs:
  build-info-viewer:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Python 3.13 セットアップ
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: 依存パッケージをインストール
        run: pip install -r scripts/pipeline/requirements.txt

      - name: info_viewer パイプラインを実行
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID }}
          APIFY_API_KEY: ${{ secrets.APIFY_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ONEDRIVE_CLIENT_ID: ${{ secrets.ONEDRIVE_CLIENT_ID }}
          ONEDRIVE_CLIENT_SECRET: ${{ secrets.ONEDRIVE_CLIENT_SECRET }}
          ONEDRIVE_REFRESH_TOKEN: ${{ secrets.ONEDRIVE_REFRESH_TOKEN }}
          INFO_VIEWER_CHANNEL_SHEET_NAME: チャンネル設定
          INFO_VIEWER_VIDEO_SHEET_NAME: 動画リスト
          INFO_VIEWER_ONEDRIVE_FOLDER: Obsidian in Onedrive 202602/Vercel_Blog/投資info_viewer
          INFO_VIEWER_MAX_ITEMS: ${{ github.event.inputs.max_items || '5' }}
        run: |
          CMD=(python scripts/info_viewer/main.py
            --max-items "${{ github.event.inputs.max_items || '5' }}"
            --channel-name "${{ github.event.inputs.channel_name || '' }}"
            --video-url "${{ github.event.inputs.video_url || '' }}"
          )
          if [ "${{ github.event.inputs.rebuild_manifest_only || 'false' }}" = "true" ]; then
            CMD+=("--rebuild-manifest-only")
          fi
          "${CMD[@]}"
