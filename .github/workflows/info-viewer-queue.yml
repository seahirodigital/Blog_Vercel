name: Info Viewer Pipeline

on:
  schedule:
    - cron: "0,30 * * * *"
    - cron: "15 * * * *"
  workflow_dispatch:
    inputs:
      mode:
        description: "実行モード"
        required: false
        type: choice
        default: process_queue
        options:
          - process_queue
          - sync_only
          - full_pipeline
          - rebuild_manifest_only
      max_items:
        description: "1回で処理する最大件数"
        required: false
        default: "2"
      channel_name:
        description: "特定チャンネルだけを処理する場合のチャンネル名"
        required: false
        default: ""
      video_url:
        description: "単一動画だけを処理する場合の動画 URL"
        required: false
        default: ""
      rebuild_manifest_only:
        description: "manifest 再構築だけを強制する"
        required: false
        type: boolean
        default: false

jobs:
  build-info-viewer:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Python 3.13 をセットアップ
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: 依存パッケージをインストール
        run: pip install -r scripts/pipeline/requirements.txt

      - name: info_viewer パイプラインを実行
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID }}
          APIFY_API_KEY: ${{ secrets.APIFY_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ONEDRIVE_CLIENT_ID: ${{ secrets.ONEDRIVE_CLIENT_ID }}
          ONEDRIVE_CLIENT_SECRET: ${{ secrets.ONEDRIVE_CLIENT_SECRET }}
          ONEDRIVE_REFRESH_TOKEN: ${{ secrets.ONEDRIVE_REFRESH_TOKEN }}
          INFO_VIEWER_CHANNEL_SHEET_NAME: チャンネル設定
          INFO_VIEWER_VIDEO_SHEET_NAME: 動画リスト
          INFO_VIEWER_ONEDRIVE_FOLDER: Obsidian in Onedrive 202602/Vercel_Blog/情報取得/info_viewer
          INFO_VIEWER_GEMINI_SERIAL_DELAY_SECONDS: "20"
          INFO_VIEWER_RETRY_SECONDS: "3600"
          INFO_VIEWER_QUOTA_RETRY_SECONDS: "7200"
          INPUT_MODE: ${{ github.event.inputs.mode || 'process_queue' }}
          INPUT_MAX_ITEMS: ${{ github.event.inputs.max_items || '2' }}
          INPUT_CHANNEL_NAME: ${{ github.event.inputs.channel_name || '' }}
          INPUT_VIDEO_URL: ${{ github.event.inputs.video_url || '' }}
          INPUT_REBUILD_MANIFEST_ONLY: ${{ github.event.inputs.rebuild_manifest_only || 'false' }}
          EVENT_NAME: ${{ github.event_name }}
          EVENT_SCHEDULE: ${{ github.event.schedule || '' }}
        run: |
          MODE="${INPUT_MODE}"
          MAX_ITEMS="${INPUT_MAX_ITEMS}"

          if [ "${EVENT_NAME}" = "schedule" ]; then
            if [ "${EVENT_SCHEDULE}" = "0,30 * * * *" ]; then
              MODE="sync_only"
              MAX_ITEMS="0"
            elif [ "${EVENT_SCHEDULE}" = "15 * * * *" ]; then
              MODE="process_queue"
              MAX_ITEMS="${INPUT_MAX_ITEMS}"
            fi
          fi

          CMD=(python scripts/info_viewer/main.py
            --max-items "${MAX_ITEMS}"
            --channel-name "${INPUT_CHANNEL_NAME}"
            --video-url "${INPUT_VIDEO_URL}"
          )

          if [ "${MODE}" = "sync_only" ]; then
            CMD+=("--sync-only")
          elif [ "${MODE}" = "process_queue" ]; then
            CMD+=("--process-queue")
          fi

          if [ "${INPUT_REBUILD_MANIFEST_ONLY}" = "true" ] || [ "${MODE}" = "rebuild_manifest_only" ]; then
            CMD+=("--rebuild-manifest-only")
          fi

          "${CMD[@]}"
