<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Xpost_blog</title>
  <meta name="description" content="Discord から拾った X 投稿をブログ記事化して確認する Xpost_blog ダッシュボード" />
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    :root {
      --bg: #000000;
      --surface: #0f1115;
      --surface-soft: #171a20;
      --surface-card: #1d2128;
      --line: rgba(255, 255, 255, 0.08);
      --line-strong: rgba(0, 113, 227, 0.32);
      --text: #f5f5f7;
      --text-soft: rgba(255, 255, 255, 0.72);
      --accent: #0071e3;
      --accent-soft: rgba(0, 113, 227, 0.16);
      --danger: #ff6961;
      --shadow: rgba(0, 0, 0, 0.28) 0 14px 34px;
      --radius: 18px;
      --sidebar-width: 280px;
      --source-width: 320px;
      --editor-width: 46%;
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; height: 100%; font-family: "Segoe UI", "Hiragino Sans", "Yu Gothic UI", sans-serif; background: var(--bg); color: var(--text); }
    a { color: #2997ff; text-decoration: none; }
    button, textarea { font: inherit; }

    body {
      background:
        radial-gradient(circle at top left, rgba(0, 113, 227, 0.12), transparent 24%),
        radial-gradient(circle at right, rgba(255, 255, 255, 0.06), transparent 26%),
        var(--bg);
    }

    .app-shell { min-height: 100%; display: flex; flex-direction: column; }
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 18px 22px;
      border-bottom: 1px solid var(--line);
      backdrop-filter: blur(18px);
      background: rgba(0, 0, 0, 0.82);
      position: sticky;
      top: 0;
      z-index: 30;
    }

    .brand-wrap { display: flex; flex-direction: column; gap: 4px; }
    .eyebrow { font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--text-soft); }
    .brand { font-size: 26px; font-weight: 600; letter-spacing: -0.04em; }
    .brand-sub { color: var(--text-soft); font-size: 13px; }

    .toolbar { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; justify-content: flex-end; }
    .toolbar button {
      border: 1px solid transparent;
      border-radius: 999px;
      padding: 10px 16px;
      color: var(--text);
      background: var(--surface-card);
      cursor: pointer;
      transition: 160ms ease;
    }
    .toolbar button:hover { border-color: var(--line-strong); background: #222735; }
    .toolbar button.primary { background: var(--accent); color: #fff; }
    .toolbar button.primary:hover { background: #1980ea; }

    .status-chip {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 9px 14px;
      border-radius: 999px;
      background: var(--surface-soft);
      border: 1px solid var(--line);
      color: var(--text-soft);
      font-size: 13px;
    }

    .workspace { flex: 1; min-height: 0; display: flex; }

    .sidebar {
      width: var(--sidebar-width);
      min-width: 220px;
      max-width: 420px;
      border-right: 1px solid var(--line);
      background: linear-gradient(180deg, rgba(15, 17, 21, 0.96), rgba(10, 12, 16, 0.96));
      display: flex;
      flex-direction: column;
      min-height: 0;
    }

    .sidebar-header, .panel-header {
      padding: 18px 18px 14px;
      border-bottom: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.01);
    }

    .sidebar-title, .panel-title { font-size: 16px; font-weight: 600; letter-spacing: -0.02em; }
    .sidebar-sub, .panel-sub { font-size: 12px; color: var(--text-soft); margin-top: 4px; }

    .tree-wrap { flex: 1; overflow: auto; padding: 12px; }
    .folder-group { margin-bottom: 18px; }
    .folder-label { font-size: 12px; text-transform: uppercase; letter-spacing: 0.12em; color: var(--text-soft); margin: 0 0 8px; }

    .article-button {
      width: 100%;
      border: 1px solid transparent;
      border-radius: 16px;
      padding: 12px 14px;
      background: transparent;
      color: var(--text);
      text-align: left;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-bottom: 8px;
      transition: 160ms ease;
    }
    .article-button:hover { background: rgba(255, 255, 255, 0.04); border-color: rgba(255, 255, 255, 0.08); }
    .article-button.active { background: var(--accent-soft); border-color: var(--line-strong); }
    .article-title { font-size: 14px; font-weight: 600; line-height: 1.45; }
    .article-meta { font-size: 12px; color: var(--text-soft); display: flex; gap: 8px; flex-wrap: wrap; }

    .resize-handle {
      width: 12px;
      cursor: col-resize;
      position: relative;
      flex-shrink: 0;
      background: transparent;
    }
    .resize-handle::after {
      content: "";
      position: absolute;
      top: 0;
      bottom: 0;
      left: 50%;
      width: 2px;
      transform: translateX(-50%);
      background: rgba(255, 255, 255, 0.05);
      transition: 160ms ease;
    }
    .resize-handle:hover::after,
    .resize-handle.dragging::after { background: rgba(0, 113, 227, 0.42); }

    .main-panels { flex: 1; min-width: 0; display: flex; min-height: 0; }
    .panel {
      min-height: 0;
      display: flex;
      flex-direction: column;
      background: rgba(16, 18, 23, 0.92);
    }
    .source-panel { width: var(--source-width); min-width: 260px; max-width: 520px; }
    .editor-panel { width: var(--editor-width); min-width: 320px; border-left: 1px solid var(--line); border-right: 1px solid var(--line); }
    .preview-panel { flex: 1; min-width: 280px; }

    .panel-body { flex: 1; min-height: 0; overflow: auto; padding: 18px; }
    .meta-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
      margin-bottom: 16px;
    }
    .meta-card {
      background: var(--surface-card);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 12px 14px;
      box-shadow: var(--shadow);
    }
    .meta-card strong { display: block; font-size: 12px; color: var(--text-soft); margin-bottom: 6px; font-weight: 500; }
    .meta-card span { font-size: 14px; line-height: 1.5; }

    textarea {
      width: 100%;
      height: 100%;
      border: 0;
      resize: none;
      background: transparent;
      color: var(--text);
      line-height: 1.7;
      padding: 18px;
      outline: none;
      font-size: 14px;
    }

    .markdown {
      line-height: 1.75;
      color: var(--text);
      font-size: 14px;
    }
    .markdown h1, .markdown h2, .markdown h3 { line-height: 1.2; letter-spacing: -0.03em; }
    .markdown h1 { font-size: 28px; margin: 0 0 18px; }
    .markdown h2 { font-size: 22px; margin: 28px 0 14px; }
    .markdown h3 { font-size: 18px; margin: 22px 0 12px; }
    .markdown p { margin: 0 0 14px; color: rgba(255,255,255,0.82); }
    .markdown ul, .markdown ol { margin: 0 0 16px 20px; padding: 0; }
    .markdown li { margin-bottom: 6px; }
    .markdown blockquote {
      margin: 18px 0;
      padding: 12px 16px;
      border-left: 3px solid var(--accent);
      background: rgba(255,255,255,0.03);
      color: rgba(255,255,255,0.78);
    }
    .markdown code {
      background: rgba(255,255,255,0.08);
      padding: 2px 7px;
      border-radius: 8px;
      font-size: 13px;
    }
    .markdown pre {
      background: #050608;
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 16px;
      overflow: auto;
    }
    .markdown a { color: #2997ff; }
    .markdown img { max-width: 100%; border-radius: 14px; }

    .empty {
      height: 100%;
      display: grid;
      place-items: center;
      color: var(--text-soft);
      text-align: center;
      padding: 32px;
    }

    .mini-actions { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; margin-top: 10px; }
    .mini-actions a { font-size: 12px; color: #2997ff; }

    @media (max-width: 1180px) {
      .workspace { flex-direction: column; }
      .sidebar { width: 100%; max-width: none; border-right: 0; border-bottom: 1px solid var(--line); }
      .resize-handle { display: none; }
      .main-panels { flex-direction: column; }
      .source-panel, .editor-panel, .preview-panel { width: 100%; min-width: 0; max-width: none; border: 0; }
      .panel { min-height: 34vh; }
    }
  </style>
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <div class="brand-wrap">
        <div class="eyebrow">discord to x blog</div>
        <div class="brand">Xpost_blog</div>
        <div class="brand-sub">SocialData 取得 → Gemini tech 整形 → OneDrive 保存</div>
      </div>
      <div class="toolbar">
        <div class="status-chip" id="statusChip">待機中</div>
        <button type="button" id="refreshButton">再読込</button>
        <button type="button" id="saveButton">保存</button>
        <button type="button" class="primary" id="pipelineButton">パイプライン実行</button>
      </div>
    </header>

    <div class="workspace">
      <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
          <div class="sidebar-title">記事一覧</div>
          <div class="sidebar-sub">Xpost_blog 配下の Markdown を表示します</div>
        </div>
        <div class="tree-wrap" id="articleList"></div>
      </aside>
      <div class="resize-handle" id="sidebarHandle"></div>

      <section class="main-panels">
        <section class="panel source-panel" id="sourcePanel">
          <div class="panel-header">
            <div class="panel-title">元投稿ビューア</div>
            <div class="panel-sub">Discord 由来の X ソースと manifest 情報を表示します</div>
            <div class="mini-actions" id="sourceLinks"></div>
          </div>
          <div class="panel-body" id="sourceBody">
            <div class="empty">記事を選ぶと、ここに元投稿ソースが表示されます。</div>
          </div>
        </section>
        <div class="resize-handle" id="sourceHandle"></div>

        <section class="panel editor-panel" id="editorPanel">
          <div class="panel-header">
            <div class="panel-title">エディタ</div>
            <div class="panel-sub" id="editorMeta">記事を選択してください</div>
          </div>
          <textarea id="editor" placeholder="記事本文がここに表示されます"></textarea>
        </section>
        <div class="resize-handle" id="editorHandle"></div>

        <section class="panel preview-panel">
          <div class="panel-header">
            <div class="panel-title">プレビュー</div>
            <div class="panel-sub">保存前の見え方を確認します</div>
          </div>
          <div class="panel-body markdown" id="preview">
            <div class="empty">プレビュー待機中</div>
          </div>
        </section>
      </section>
    </div>
  </div>

  <script>
    const state = {
      articles: [],
      selectedArticle: null,
      frontmatterContent: '',
      editorContent: '',
      sourceContent: '',
      sourceMeta: null,
      dirty: false,
    };

    const els = {
      articleList: document.getElementById('articleList'),
      statusChip: document.getElementById('statusChip'),
      saveButton: document.getElementById('saveButton'),
      refreshButton: document.getElementById('refreshButton'),
      pipelineButton: document.getElementById('pipelineButton'),
      editor: document.getElementById('editor'),
      preview: document.getElementById('preview'),
      sourceBody: document.getElementById('sourceBody'),
      sourceLinks: document.getElementById('sourceLinks'),
      editorMeta: document.getElementById('editorMeta'),
      sidebar: document.getElementById('sidebar'),
      sourcePanel: document.getElementById('sourcePanel'),
      editorPanel: document.getElementById('editorPanel'),
      sidebarHandle: document.getElementById('sidebarHandle'),
      sourceHandle: document.getElementById('sourceHandle'),
      editorHandle: document.getElementById('editorHandle'),
    };

    function setStatus(message, isError = false) {
      els.statusChip.textContent = message;
      els.statusChip.style.color = isError ? 'var(--danger)' : 'var(--text-soft)';
      els.statusChip.style.borderColor = isError ? 'rgba(255, 105, 97, 0.35)' : 'var(--line)';
    }

    function escapeHtml(text) {
      return String(text || '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function renderMarkdown(text) {
      if (!text || !text.trim()) {
        return '<div class="empty">表示する内容がありません。</div>';
      }
      if (window.marked?.parse) {
        return marked.parse(text, { breaks: true, gfm: true });
      }
      return `<pre>${escapeHtml(text)}</pre>`;
    }

    function composeMarkdownDocument(frontmatter, body) {
      const normalizedBody = String(body || '').trim();
      const normalizedFrontmatter = String(frontmatter || '').trim();
      if (!normalizedFrontmatter) {
        return normalizedBody;
      }
      if (!normalizedBody) {
        return `${normalizedFrontmatter}\n`;
      }
      return `${normalizedFrontmatter}\n\n${normalizedBody}\n`;
    }

    function buildFolderGroups(articles) {
      const groups = new Map();
      for (const article of articles) {
        const key = article.path || 'ルート';
        if (!groups.has(key)) groups.set(key, []);
        groups.get(key).push(article);
      }
      return [...groups.entries()].sort((a, b) => a[0].localeCompare(b[0], 'ja'));
    }

    function renderArticleList() {
      if (!state.articles.length) {
        els.articleList.innerHTML = '<div class="empty">記事はまだありません。パイプライン実行後に再読込してください。</div>';
        return;
      }

      const groups = buildFolderGroups(state.articles);
      els.articleList.innerHTML = groups.map(([folder, items]) => {
        const buttons = items.map((article) => {
          const title = article.h1Title || article.name.replace(/\.md$/, '');
          const active = state.selectedArticle?.id === article.id ? 'active' : '';
          return `
            <button class="article-button ${active}" data-article-id="${article.id}">
              <span class="article-title">${escapeHtml(title)}</span>
              <span class="article-meta">
                <span>${escapeHtml(article.name)}</span>
                <span>${escapeHtml((article.lastModified || '').replace('T', ' ').replace('Z', ''))}</span>
              </span>
            </button>
          `;
        }).join('');

        return `
          <section class="folder-group">
            <div class="folder-label">${escapeHtml(folder || 'ルート')}</div>
            ${buttons}
          </section>
        `;
      }).join('');

      els.articleList.querySelectorAll('[data-article-id]').forEach((button) => {
        button.addEventListener('click', () => {
          const article = state.articles.find((item) => item.id === button.dataset.articleId);
          if (article) selectArticle(article);
        });
      });
    }

    async function fetchArticles() {
      setStatus('記事一覧を取得中…');
      const response = await fetch('/api/xpost-blog-articles', { cache: 'no-store' });
      if (!response.ok) throw new Error('記事一覧の取得に失敗しました');
      const data = await response.json();
      state.articles = data.articles || [];
      renderArticleList();
      setStatus(`記事一覧を更新しました (${state.articles.length}件)`);
    }

    async function selectArticle(article) {
      state.selectedArticle = article;
      state.dirty = false;
      renderArticleList();
      els.editorMeta.textContent = `${article.h1Title || article.name} を読み込み中…`;
      setStatus('記事本文を取得中…');

      const [articleResponse, sourceResponse] = await Promise.all([
        fetch(`/api/xpost-blog-articles?id=${encodeURIComponent(article.id)}`, { cache: 'no-store' }),
        fetch(`/api/xpost-blog-index?articleId=${encodeURIComponent(article.id)}`, { cache: 'no-store' }),
      ]);

      if (!articleResponse.ok) throw new Error('記事本文の取得に失敗しました');
      const articleData = await articleResponse.json();
      state.frontmatterContent = articleData.frontmatter || '';
      state.editorContent = articleData.body || articleData.content || '';
      els.editor.value = state.editorContent;
      els.preview.innerHTML = renderMarkdown(state.editorContent);
      els.editorMeta.textContent = `${article.name} / 最終更新: ${(article.lastModified || '').replace('T', ' ').replace('Z', '')}`;

      if (sourceResponse.ok) {
        const sourceData = await sourceResponse.json();
        state.sourceMeta = sourceData.item || null;
        state.sourceContent = sourceData.sourceContent || '';
        renderSourcePanel();
      } else {
        state.sourceMeta = null;
        state.sourceContent = '';
        renderSourcePanel();
      }

      setStatus(`${article.h1Title || article.name} を読み込みました`);
    }

    function renderSourcePanel() {
      const item = state.sourceMeta;
      if (!item) {
        els.sourceBody.innerHTML = '<div class="empty">manifest 側に元投稿情報がまだありません。</div>';
        els.sourceLinks.innerHTML = '';
        return;
      }

      const stats = [
        ['投稿者', item.authorName || '-'],
        ['いいね', item.favoriteCount ?? 0],
        ['リポスト', item.repostCount ?? 0],
        ['状態', item.articleStatus || '-'],
      ];

      els.sourceBody.innerHTML = `
        <div class="meta-grid">
          ${stats.map(([label, value]) => `<div class="meta-card"><strong>${escapeHtml(label)}</strong><span>${escapeHtml(String(value))}</span></div>`).join('')}
        </div>
        <div class="markdown">${renderMarkdown(state.sourceContent)}</div>
      `;

      const links = [];
      if (item.postUrl) links.push(`<a href="${item.postUrl}" target="_blank" rel="noreferrer">X を開く</a>`);
      if (item.discordJumpUrl) links.push(`<a href="${item.discordJumpUrl}" target="_blank" rel="noreferrer">Discord を開く</a>`);
      if (item.articleWebUrl) links.push(`<a href="${item.articleWebUrl}" target="_blank" rel="noreferrer">OneDrive 記事</a>`);
      if (item.sourceWebUrl) links.push(`<a href="${item.sourceWebUrl}" target="_blank" rel="noreferrer">OneDrive 元投稿</a>`);
      els.sourceLinks.innerHTML = links.join('');
    }

    async function saveCurrentArticle() {
      if (!state.selectedArticle) {
        setStatus('保存対象の記事が未選択です', true);
        return;
      }
      setStatus('保存中…');
      const response = await fetch('/api/xpost-blog-articles', {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          filename: state.selectedArticle.name,
          fileId: state.selectedArticle.id,
          content: composeMarkdownDocument(state.frontmatterContent, els.editor.value),
        }),
      });
      if (!response.ok) {
        const payload = await response.json().catch(() => ({}));
        throw new Error(payload.error || '保存に失敗しました');
      }
      state.dirty = false;
      setStatus('保存しました');
      await fetchArticles();
      const refreshed = state.articles.find((item) => item.id === state.selectedArticle.id);
      if (refreshed) state.selectedArticle = refreshed;
      renderArticleList();
    }

    async function triggerPipeline() {
      setStatus('パイプライン起動中…');
      const response = await fetch('/api/trigger-xpost-blog', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ mode: 'full_pipeline' }),
      });
      const payload = await response.json().catch(() => ({}));
      if (!response.ok) throw new Error(payload.error || 'パイプライン起動に失敗しました');
      setStatus(payload.message || 'パイプラインを起動しました');
    }

    function applyResizer(handle, target, cssVar, minPx, maxPx) {
      let dragging = false;
      handle.addEventListener('pointerdown', (event) => {
        dragging = true;
        handle.classList.add('dragging');
        const startX = event.clientX;
        const startWidth = target.getBoundingClientRect().width;

        function onMove(moveEvent) {
          if (!dragging) return;
          const nextWidth = Math.min(Math.max(startWidth + (moveEvent.clientX - startX), minPx), maxPx);
          document.documentElement.style.setProperty(cssVar, `${nextWidth}px`);
        }

        function onUp() {
          dragging = false;
          handle.classList.remove('dragging');
          window.removeEventListener('pointermove', onMove);
          window.removeEventListener('pointerup', onUp);
        }

        window.addEventListener('pointermove', onMove);
        window.addEventListener('pointerup', onUp);
      });
    }

    function applyEditorResizer(handle) {
      let dragging = false;
      handle.addEventListener('pointerdown', (event) => {
        dragging = true;
        handle.classList.add('dragging');
        const container = handle.parentElement;
        const sourceWidth = els.sourcePanel.getBoundingClientRect().width;
        const previewWidth = container.getBoundingClientRect().width - sourceWidth - 24;
        const startX = event.clientX;
        const startWidth = els.editorPanel.getBoundingClientRect().width;

        function onMove(moveEvent) {
          if (!dragging) return;
          const nextWidth = Math.min(Math.max(startWidth + (moveEvent.clientX - startX), 320), previewWidth - 280);
          const ratio = (nextWidth / previewWidth) * 100;
          document.documentElement.style.setProperty('--editor-width', `${ratio}%`);
        }

        function onUp() {
          dragging = false;
          handle.classList.remove('dragging');
          window.removeEventListener('pointermove', onMove);
          window.removeEventListener('pointerup', onUp);
        }

        window.addEventListener('pointermove', onMove);
        window.addEventListener('pointerup', onUp);
      });
    }

    els.editor.addEventListener('input', () => {
      state.dirty = true;
      state.editorContent = els.editor.value;
      els.preview.innerHTML = renderMarkdown(state.editorContent);
      setStatus('未保存の変更があります');
    });

    els.saveButton.addEventListener('click', () => saveCurrentArticle().catch((error) => setStatus(error.message, true)));
    els.refreshButton.addEventListener('click', () => fetchArticles().catch((error) => setStatus(error.message, true)));
    els.pipelineButton.addEventListener('click', () => triggerPipeline().catch((error) => setStatus(error.message, true)));

    applyResizer(els.sidebarHandle, els.sidebar, '--sidebar-width', 220, 420);
    applyResizer(els.sourceHandle, els.sourcePanel, '--source-width', 260, 520);
    applyEditorResizer(els.editorHandle);

    fetchArticles().catch((error) => setStatus(error.message, true));
  </script>
</body>
</html>
