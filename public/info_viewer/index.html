<html lang="ja">

  <style>
    :root {
      --bg: #f6f1e8;
      --bg-strong: #ece3d5;
      --surface: rgba(255, 251, 245, 0.88);
      --surface-strong: #fffaf2;
      --ink: #1f2a2c;
      --muted: #5b6768;
      --line: rgba(31, 42, 44, 0.12);
      --accent: #c85c3b;
      --accent-strong: #9e3f21;
      --accent-soft: rgba(200, 92, 59, 0.14);
      --deep: #24454c;
      --shadow: 0 18px 50px rgba(34, 46, 49, 0.14);
      --radius-lg: 28px;
      --radius-md: 20px;
      --radius-sm: 14px;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
    }

    body {
      font-family: 'Noto Sans JP', sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at top left, rgba(36, 69, 76, 0.18), transparent 30%),
        radial-gradient(circle at top right, rgba(200, 92, 59, 0.14), transparent 26%),
        linear-gradient(180deg, #f7f3eb 0%, #f2e8d9 100%);
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    button {
      font: inherit;
    }

    .shell {
      min-height: 100vh;
      padding: 24px;
    }

    .app {
      max-width: 1680px;
      margin: 0 auto;
      display: grid;
      gap: 18px;
    }

    .hero {
      border: 1px solid var(--line);
      border-radius: 32px;
      background:
        linear-gradient(135deg, rgba(255, 250, 242, 0.98), rgba(250, 241, 229, 0.94)),
        linear-gradient(135deg, rgba(36, 69, 76, 0.04), rgba(200, 92, 59, 0.04));
      box-shadow: var(--shadow);
      padding: 22px 24px;
      position: relative;
      overflow: hidden;
    }

    .hero::after {
      content: '';
      position: absolute;
      inset: auto -8% -50% auto;
      width: 280px;
      height: 280px;
      border-radius: 999px;
      background: radial-gradient(circle, rgba(200, 92, 59, 0.18), transparent 68%);
      pointer-events: none;
    }

    .hero-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
      flex-wrap: wrap;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(36, 69, 76, 0.08);
      color: var(--deep);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    .hero h1 {
      margin: 14px 0 10px;
      font-family: 'Space Grotesk', 'Noto Sans JP', sans-serif;
      font-size: clamp(32px, 4vw, 54px);
      line-height: 1;
      letter-spacing: -0.04em;
    }

    .hero p {
      margin: 0;
      max-width: 780px;
      color: var(--muted);
      line-height: 1.8;
      font-size: 14px;
    }

    .hero-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
    }

    .hero-link,
    .hero-ghost,
    .mobile-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      border-radius: 999px;
      padding: 11px 16px;
      font-size: 13px;
      font-weight: 700;
      transition: transform 0.18s ease, background 0.18s ease, border-color 0.18s ease;
      cursor: pointer;
      border: 1px solid transparent;
    }

    .hero-link {
      background: var(--deep);
      color: #fff8f2;
      box-shadow: 0 10px 26px rgba(36, 69, 76, 0.22);
    }

    .hero-link:hover,
    .mobile-button:hover {
      transform: translateY(-1px);
    }

    .hero-ghost,
    .mobile-button {
      background: rgba(255, 255, 255, 0.6);
      border-color: var(--line);
      color: var(--ink);
    }

    .hero-stats {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
      margin-top: 18px;
    }

    .stat {
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.58);
      border-radius: 18px;
      padding: 16px;
    }

    .stat-label {
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    .stat-value {
      margin-top: 10px;
      font-family: 'Space Grotesk', 'Noto Sans JP', sans-serif;
      font-size: clamp(22px, 3vw, 34px);
      letter-spacing: -0.04em;
    }

    .layout {
      display: grid;
      grid-template-columns: 292px 372px minmax(0, 1fr);
      gap: 18px;
      min-height: calc(100vh - 260px);
    }

    .pane {
      border: 1px solid var(--line);
      border-radius: var(--radius-lg);
      background: var(--surface);
      backdrop-filter: blur(10px);
      box-shadow: var(--shadow);
      display: flex;
      flex-direction: column;
      min-height: 0;
      overflow: hidden;
    }

    .pane-head {
      padding: 18px 20px 14px;
      border-bottom: 1px solid var(--line);
      background: linear-gradient(180deg, rgba(255, 253, 249, 0.96), rgba(255, 251, 245, 0.7));
    }

    .pane-title {
      margin: 0;
      font-family: 'Space Grotesk', 'Noto Sans JP', sans-serif;
      font-size: 20px;
      letter-spacing: -0.03em;
    }

    .pane-subtitle {
      margin-top: 7px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.6;
    }

    .pane-body {
      padding: 12px;
      overflow: auto;
      min-height: 0;
    }

    .channel-list,
    .video-list {
      display: grid;
      gap: 10px;
    }

    .channel-card,
    .video-card {
      width: 100%;
      border: 1px solid transparent;
      border-radius: var(--radius-md);
      padding: 16px;
      background: transparent;
      color: inherit;
      text-align: left;
      transition: transform 0.18s ease, border-color 0.18s ease, background 0.18s ease, box-shadow 0.18s ease;
      cursor: pointer;
    }

    .channel-card:hover,
    .video-card:hover {
      background: rgba(255, 255, 255, 0.7);
      border-color: rgba(36, 69, 76, 0.14);
      transform: translateY(-1px);
    }

    .channel-card.active,
    .video-card.active {
      background: linear-gradient(135deg, rgba(36, 69, 76, 0.94), rgba(47, 82, 90, 0.94));
      color: #fef8f0;
      box-shadow: 0 14px 30px rgba(36, 69, 76, 0.2);
    }

    .channel-card.active .meta,
    .video-card.active .meta,
    .channel-card.active .micro,
    .video-card.active .micro,
    .channel-card.active .status-pill,
    .video-card.active .status-pill {
      color: #d9e6e7;
      border-color: rgba(255, 255, 255, 0.2);
      background: rgba(255, 255, 255, 0.1);
    }

    .card-title {
      margin: 0;
      font-size: 16px;
      font-weight: 700;
      line-height: 1.5;
    }

    .meta {
      margin-top: 8px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.7;
    }

    .micro-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 10px;
    }

    .micro,
    .status-pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      border-radius: 999px;
      border: 1px solid rgba(36, 69, 76, 0.12);
      background: rgba(255, 255, 255, 0.72);
      padding: 6px 10px;
      font-size: 11px;
      font-weight: 700;
      color: var(--muted);
    }

    .status-ready {
      color: var(--accent-strong);
      background: var(--accent-soft);
      border-color: rgba(200, 92, 59, 0.24);
    }

    .status-pending {
      color: var(--deep);
      background: rgba(36, 69, 76, 0.08);
      border-color: rgba(36, 69, 76, 0.14);
    }

    .empty-note {
      border: 1px dashed rgba(36, 69, 76, 0.18);
      border-radius: var(--radius-md);
      padding: 18px;
      color: var(--muted);
      line-height: 1.8;
      background: rgba(255, 255, 255, 0.42);
    }

    .content-shell {
      display: flex;
      flex-direction: column;
      min-height: 0;
      height: 100%;
    }

    .article-bar {
      padding: 22px 24px 18px;
      border-bottom: 1px solid var(--line);
      background:
        linear-gradient(135deg, rgba(255, 251, 243, 0.98), rgba(255, 246, 236, 0.82));
    }

    .article-kicker {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border-radius: 999px;
      background: var(--accent-soft);
      color: var(--accent-strong);
      font-size: 12px;
      font-weight: 700;
    }

    .article-title {
      margin: 14px 0 0;
      font-family: 'Space Grotesk', 'Noto Sans JP', sans-serif;
      font-size: clamp(28px, 3.6vw, 44px);
      line-height: 1.02;
      letter-spacing: -0.04em;
    }

    .article-meta {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 14px;
    }

    .article-body {
      padding: 26px 28px 42px;
      overflow: auto;
      min-height: 0;
    }

    .article-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 18px;
    }

    .article-link {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      border-radius: 999px;
      padding: 11px 14px;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.66);
      font-size: 13px;
      font-weight: 700;
    }

    .article-link.primary {
      background: var(--accent);
      border-color: var(--accent);
      color: #fffaf5;
    }

    .article-placeholder {
      border: 1px dashed rgba(200, 92, 59, 0.24);
      border-radius: 26px;
      padding: 26px;
      background: linear-gradient(180deg, rgba(255, 250, 244, 0.96), rgba(255, 245, 238, 0.82));
    }

    .article-placeholder h3 {
      margin: 0;
      font-family: 'Space Grotesk', 'Noto Sans JP', sans-serif;
      font-size: 28px;
      letter-spacing: -0.03em;
    }

    .article-placeholder p {
      margin: 12px 0 0;
      color: var(--muted);
      line-height: 1.9;
      font-size: 14px;
    }

    .markdown {
      color: var(--ink);
      line-height: 1.9;
      font-size: 15px;
    }

    .markdown>*:first-child {
      margin-top: 0;
    }

    .markdown h1,
    .markdown h2,
    .markdown h3 {
      font-family: 'Space Grotesk', 'Noto Sans JP', sans-serif;
      letter-spacing: -0.03em;
      line-height: 1.15;
    }

    .markdown h1 {
      font-size: 34px;
      margin: 0 0 22px;
    }

    .markdown h2 {
      margin: 34px 0 16px;
      font-size: 24px;
      padding-bottom: 10px;
      border-bottom: 1px solid rgba(36, 69, 76, 0.12);
    }

    .markdown h3 {
      margin: 24px 0 12px;
      font-size: 18px;
    }

    .markdown p {
      margin: 12px 0;
    }

    .markdown ul,
    .markdown ol {
      margin: 14px 0;
      padding-left: 22px;
    }

    .markdown li {
      margin: 8px 0;
    }

    .markdown blockquote {
      margin: 20px 0;
      padding: 14px 18px;
      border-left: 4px solid var(--accent);
      border-radius: 0 16px 16px 0;
      background: rgba(200, 92, 59, 0.08);
      color: var(--accent-strong);
    }

    .markdown code {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.9em;
      background: rgba(36, 69, 76, 0.08);
      padding: 2px 6px;
      border-radius: 8px;
    }

    .markdown pre {
      overflow: auto;
      padding: 16px;
      border-radius: 18px;
      background: #1f2a2c;
      color: #f7efe5;
    }

    .markdown pre code {
      background: transparent;
      padding: 0;
      color: inherit;
    }

    .markdown a {
      color: var(--accent-strong);
      font-weight: 700;
    }

    .mobile-tools {
      display: none;
      gap: 10px;
      flex-wrap: wrap;
    }

    .drawer-overlay {
      position: fixed;
      inset: 0;
      background: rgba(19, 28, 30, 0.45);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.22s ease;
      z-index: 60;
    }

    .drawer-overlay.open {
      opacity: 1;
      pointer-events: auto;
    }

    .drawer {
      position: fixed;
      top: 0;
      left: 0;
      bottom: 0;
      width: min(92vw, 420px);
      background: #fffaf2;
      border-right: 1px solid var(--line);
      box-shadow: 0 18px 42px rgba(24, 33, 34, 0.24);
      transform: translateX(-100%);
      transition: transform 0.26s ease;
      z-index: 70;
      display: grid;
      grid-template-rows: auto auto minmax(0, 1fr);
    }

    .drawer.open {
      transform: translateX(0);
    }

    .drawer-head {
      padding: 20px;
      border-bottom: 1px solid var(--line);
    }

    .drawer-tabs {
      display: flex;
      gap: 8px;
      padding: 14px 20px 0;
    }

    .drawer-tab {
      flex: 1;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.7);
      padding: 10px 12px;
      font-size: 13px;
      font-weight: 700;
      color: var(--muted);
      cursor: pointer;
    }

    .drawer-tab.active {
      background: var(--deep);
      border-color: var(--deep);
      color: #fff8f2;
    }

    .drawer-body {
      min-height: 0;
      overflow: auto;
      padding: 14px;
    }

    .drawer-panel {
      display: none;
    }

    .drawer-panel.active {
      display: block;
    }

    @media (max-width: 1180px) {
      .layout {
        grid-template-columns: 250px 320px minmax(0, 1fr);
      }
    }

    @media (max-width: 980px) {
      .shell {
        padding: 16px;
      }

      .hero {
        padding: 18px;
        border-radius: 26px;
      }

      .hero-stats {
        grid-template-columns: 1fr;
      }

      .layout {
        grid-template-columns: 1fr;
        min-height: auto;
      }

      .layout .pane.channel-pane,
      .layout .pane.video-pane {
        display: none;
      }

      .layout .pane.content-pane {
        min-height: calc(100vh - 280px);
      }

      .mobile-tools {
        display: flex;
      }

      .article-bar {
        padding: 18px;
      }

      .article-body {
        padding: 22px 18px 34px;
      }
    }
  </style>
</head>

    const state = {
      selectedChannelId: dataset[0].id,
      selectedVideoId: dataset[0].videos[0].id,
      drawerOpen: false,
      drawerTab: 'channels'
    };

    const channelList = document.getElementById('channelList');
    const videoList = document.getElementById('videoList');
    const articleBar = document.getElementById('articleBar');
    const articleBody = document.getElementById('articleBody');
    const videoPaneSubtitle = document.getElementById('videoPaneSubtitle');
    const heroStats = document.getElementById('heroStats');
    const drawer = document.getElementById('drawer');
    const drawerOverlay = document.getElementById('drawerOverlay');
    const drawerChannels = document.getElementById('drawerChannels');
    const drawerVideos = document.getElementById('drawerVideos');
    const drawerTabs = Array.from(document.querySelectorAll('.drawer-tab'));

    function getSelectedChannel() {
      return dataset.find((channel) => channel.id === state.selectedChannelId) || dataset[0];
    }

    function getSelectedVideo() {
      const channel = getSelectedChannel();
      return channel.videos.find((video) => video.id === state.selectedVideoId) || channel.videos[0];
    }

    function formatDate(dateText) {
      if (!dateText) return '日付未設定';
      const date = new Date(dateText);
      if (Number.isNaN(date.getTime())) return dateText;
      return new Intl.DateTimeFormat('ja-JP', {
        year: 'numeric',
        month: 'long',
        day: 'numeric'
      }).format(date);
    }

    function formatDateTime(dateText) {
      if (!dateText) return '未生成';
      const date = new Date(dateText);
      if (Number.isNaN(date.getTime())) return dateText;
      return new Intl.DateTimeFormat('ja-JP', {
        year: 'numeric',
        month: 'short',
        day: 'numeric',
        hour: '2-digit',
        minute: '2-digit'
      }).format(date);
    }

    function countReadyVideos() {
      return dataset.reduce((count, channel) => {
        return count + channel.videos.filter((video) => Boolean(video.articleMarkdown)).length;
      }, 0);
    }

    function renderStats() {
      const totalChannels = dataset.length;
      const totalVideos = dataset.reduce((count, channel) => count + channel.videos.length, 0);
      const readyVideos = countReadyVideos();

      heroStats.innerHTML = `
        <div class="stat">
          <div class="stat-label">Channel Count</div>
          <div class="stat-value">${totalChannels}</div>
        </div>
        <div class="stat">
          <div class="stat-label">Video Count</div>
          <div class="stat-value">${totalVideos}</div>
        </div>
        <div class="stat">
          <div class="stat-label">Dummy Articles</div>
          <div class="stat-value">${readyVideos}</div>
        </div>
      `;
    }

    function renderChannels(target) {
      const html = dataset.map((channel) => {
        const isActive = channel.id === state.selectedChannelId;
        const readyCount = channel.videos.filter((video) => Boolean(video.articleMarkdown)).length;
        return `
          <button class="channel-card${isActive ? ' active' : ''}" type="button" data-channel-id="${channel.id}">
            <h3 class="card-title">${channel.name}</h3>
            <div class="meta">${channel.description}</div>
            <div class="micro-row">
              <span class="micro">${channel.videos.length} 本</span>
              <span class="status-pill ${readyCount > 0 ? 'status-ready' : 'status-pending'}">${readyCount} 件の記事</span>
            </div>
          </button>
        `;
      }).join('');

      target.innerHTML = html;
      target.querySelectorAll('[data-channel-id]').forEach((button) => {
        button.addEventListener('click', () => {
          selectChannel(button.getAttribute('data-channel-id'));
          if (window.innerWidth <= 980) {
            setDrawerTab('videos');
          }
        });
      });
    }

    function renderVideos(target) {
      const channel = getSelectedChannel();
      videoPaneSubtitle.textContent = `${channel.name} の動画一覧。記事がまだない動画も先に見える設計です。`;

      if (!channel.videos.length) {
        target.innerHTML = '<div class="empty-note">このチャンネルには動画がまだありません。</div>';
        return;
      }

      target.innerHTML = channel.videos.map((video) => {
        const isActive = video.id === state.selectedVideoId;
        const ready = Boolean(video.articleMarkdown);
        return `
          <button class="video-card${isActive ? ' active' : ''}" type="button" data-video-id="${video.id}">
            <h3 class="card-title">${video.title}</h3>
            <div class="meta">${formatDate(video.publishedAt)} ・ ${video.duration}</div>
            <div class="micro-row">
              <span class="status-pill ${ready ? 'status-ready' : 'status-pending'}">${ready ? '記事あり' : '未生成'}</span>
              <span class="micro">${video.articleUpdatedAt ? '更新 ' + formatDateTime(video.articleUpdatedAt) : '次フェーズで生成'}</span>
            </div>
          </button>
        `;
      }).join('');

      target.querySelectorAll('[data-video-id]').forEach((button) => {
        button.addEventListener('click', () => {
          state.selectedVideoId = button.getAttribute('data-video-id');
          render();
          closeDrawer();
        });
      });
    }

    function renderArticle() {
      const channel = getSelectedChannel();
      const video = getSelectedVideo();
      const ready = Boolean(video.articleMarkdown);

      articleBar.innerHTML = `
        <div class="article-kicker">${ready ? 'Dummy Article Ready' : 'Article Pending'}</div>
        <h2 class="article-title">${video.title}</h2>
        <div class="article-meta">
          <span class="micro">${channel.name}</span>
          <span class="micro">${formatDate(video.publishedAt)}</span>
          <span class="micro">${video.duration}</span>
          <span class="status-pill ${ready ? 'status-ready' : 'status-pending'}">${ready ? '記事あり' : '未生成'}</span>
        </div>
        <div class="article-actions">
          <a class="article-link primary" href="${video.youtubeUrl}" target="_blank" rel="noopener noreferrer">元動画を開く</a>
          <a class="article-link" href="${channel.channelUrl}" target="_blank" rel="noopener noreferrer">チャンネルを開く</a>
        </div>
      `;

      if (!ready) {
        articleBody.innerHTML = `
          <div class="article-placeholder">
            <h3>記事はまだ生成されていません。</h3>
            <p>
              第一弾では、動画一覧に未生成アイテムも先に表示します。これにより、
              「どのチャンネルに、どの動画があり、どこまで記事化されているか」を閲覧専用 UI 上で確認できます。
            </p>
            <p>
              第二弾では、ここに Apify 取得 → Gemini 整形 → OneDrive 保存された実記事が入る想定です。
            </p>
            <div class="article-actions">
              <a class="article-link primary" href="${video.youtubeUrl}" target="_blank" rel="noopener noreferrer">元動画を開く</a>
            </div>
          </div>
        `;
        return;
      }

      articleBody.innerHTML = `<div class="markdown">${marked.parse(video.articleMarkdown)}</div>`;
    }

    function selectChannel(channelId) {
      const channel = dataset.find((item) => item.id === channelId);
      if (!channel) return;
      state.selectedChannelId = channel.id;
      state.selectedVideoId = channel.videos[0] ? channel.videos[0].id : null;
      render();
    }

    function setDrawerTab(tab) {
      state.drawerTab = tab;
      drawerTabs.forEach((button) => {
        button.classList.toggle('active', button.dataset.tab === tab);
      });
      document.getElementById('drawerChannels').classList.toggle('active', tab === 'channels');
      document.getElementById('drawerVideos').classList.toggle('active', tab === 'videos');
    }

    function openDrawer(tab) {
      setDrawerTab(tab);
      state.drawerOpen = true;
      drawer.classList.add('open');
      drawerOverlay.classList.add('open');
      document.body.style.overflow = 'hidden';
    }

    function closeDrawer() {
      state.drawerOpen = false;
      drawer.classList.remove('open');
      drawerOverlay.classList.remove('open');
      document.body.style.overflow = '';
    }

    function render() {
      renderStats();
      renderChannels(channelList);
      renderVideos(videoList);
      renderChannels(drawerChannels);
      renderVideos(drawerVideos);
      renderArticle();
    }

    drawerTabs.forEach((button) => {
      button.addEventListener('click', () => setDrawerTab(button.dataset.tab));
    });

    document.getElementById('openChannels').addEventListener('click', () => openDrawer('channels'));
    document.getElementById('openVideos').addEventListener('click', () => openDrawer('videos'));
    document.getElementById('closeDrawer').addEventListener('click', closeDrawer);
    drawerOverlay.addEventListener('click', closeDrawer);

    render();
  </script>
</body>
