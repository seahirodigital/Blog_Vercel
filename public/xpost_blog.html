<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Xpost_blog</title>
  <meta name="description" content="Xpost_blog" />
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    :root {
      --app-bg: #f8fafc;
      --surface: #ffffff;
      --surface-soft: #f1f5f9;
      --line: #d9e2ec;
      --line-strong: #94a3b8;
      --text: #0f172a;
      --text-soft: #64748b;
      --accent: #0f766e;
      --accent-soft: #ccfbf1;
      --danger: #b91c1c;
      --sidebar-width: 280px;
      --source-width: 300px;
      --editor-width: 500px;
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; height: 100%; overflow: hidden; }
    body {
      color: var(--text);
      background: var(--app-bg);
      font-family: "BIZ UDPGothic", "Yu Gothic", "Hiragino Kaku Gothic ProN", sans-serif;
    }
    button, textarea, input { font: inherit; }
    button { color: inherit; border-radius: 0; }
    a { color: var(--accent); }

    .app-shell {
      height: 100vh;
      min-height: 0;
      display: flex;
      flex-direction: column;
      background: var(--app-bg);
    }

    .topbar {
      height: 50px;
      flex: 0 0 50px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 0 12px;
      border-bottom: 1px solid var(--line);
      background: var(--surface);
    }

    .brand {
      margin: 0;
      font-size: 15px;
      font-weight: 800;
      letter-spacing: 0.08em;
      white-space: nowrap;
    }

    .toolbar {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 6px;
      min-width: 0;
    }

    .status-chip {
      min-width: 180px;
      max-width: min(42vw, 540px);
      height: 30px;
      display: inline-flex;
      align-items: center;
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
      padding: 0 10px;
      border-left: 3px solid var(--accent);
      background: var(--surface-soft);
      color: var(--text-soft);
      font-size: 12px;
    }

    .tool-button,
    .icon-button,
    .icon-link,
    .flat-button {
      height: 30px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 0 10px;
      border: 1px solid var(--line);
      background: var(--surface);
      color: var(--text);
      text-decoration: none;
      cursor: pointer;
    }

    .tool-button:hover,
    .icon-button:hover,
    .icon-link:hover,
    .flat-button:hover {
      background: var(--surface-soft);
      border-color: var(--line-strong);
    }

    .tool-button.primary {
      color: #ffffff;
      background: var(--accent);
      border-color: var(--accent);
    }

    .tool-button.primary:hover {
      background: #115e59;
      border-color: #115e59;
    }

    .tool-button.danger {
      color: var(--danger);
      border-color: rgba(185, 28, 28, 0.35);
    }

    .icon-button,
    .icon-link {
      width: 32px;
      padding: 0;
      flex: 0 0 32px;
    }

    .tool-button[disabled],
    .icon-button[disabled],
    .flat-button[disabled],
    .icon-link[aria-disabled="true"] {
      opacity: 0.42;
      pointer-events: none;
    }

    .icon-button svg,
    .icon-link svg,
    .tool-button svg,
    .flat-button svg {
      width: 18px;
      height: 18px;
      stroke: currentColor;
      fill: none;
      stroke-width: 2;
    }
    .workspace {
      flex: 1;
      min-height: 0;
      display: flex;
      overflow: hidden;
      background: var(--app-bg);
    }

    .panel,
    .sidebar {
      height: 100%;
      min-width: 0;
      display: flex;
      flex-direction: column;
      background: var(--surface);
      border-right: 1px solid var(--line);
    }

    .sidebar {
      width: var(--sidebar-width);
      flex: 0 0 var(--sidebar-width);
      border-left: 0;
    }

    .source-panel {
      width: var(--source-width);
      flex: 0 0 var(--source-width);
    }

    .editor-panel {
      width: var(--editor-width);
      flex: 0 0 var(--editor-width);
    }

    .preview-panel {
      flex: 1 1 auto;
      border-right: 0;
    }

    .source-hidden .source-panel,
    .source-hidden #sourceHandle {
      display: none;
    }

    .panel-header,
    .sidebar-header {
      height: 44px;
      flex: 0 0 44px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      padding: 0 10px;
      border-bottom: 1px solid var(--line);
      background: var(--surface-soft);
    }

    .panel-title,
    .sidebar-title {
      min-width: 0;
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
      font-size: 13px;
      font-weight: 800;
    }

    .panel-actions,
    .editor-links,
    .source-links {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 4px;
      min-width: 0;
    }

    .count-chip {
      height: 26px;
      display: inline-flex;
      align-items: center;
      padding: 0 8px;
      background: var(--surface);
      border: 1px solid var(--line);
      color: var(--text-soft);
      font-size: 12px;
      white-space: nowrap;
    }

    .resize-handle {
      width: 6px;
      flex: 0 0 6px;
      position: relative;
      cursor: col-resize;
      background: var(--surface-soft);
      border-right: 1px solid var(--line);
      border-left: 1px solid #ffffff;
    }

    .resize-handle::before {
      content: "";
      position: absolute;
      top: 0;
      bottom: 0;
      left: 2px;
      width: 1px;
      background: var(--line-strong);
      opacity: 0;
    }

    .resize-handle:hover::before,
    .resize-handle.dragging::before {
      opacity: 1;
    }

    .content-scroll {
      flex: 1;
      min-height: 0;
      overflow: auto;
      background: var(--surface);
    }
    .article-list {
      margin: 0;
      padding: 0;
      list-style: none;
    }

    .article-row {
      width: 100%;
      display: block;
      border: 0;
      border-bottom: 1px solid var(--line);
      border-left: 3px solid transparent;
      background: var(--surface);
      text-align: left;
      cursor: pointer;
      padding: 9px 10px 9px 9px;
    }

    .article-row:hover { background: var(--surface-soft); }
    .article-row.active { border-left-color: var(--accent); background: var(--accent-soft); }
    .article-title { display: block; font-size: 13px; font-weight: 700; line-height: 1.45; }
    .article-meta { display: block; margin-top: 4px; color: var(--text-soft); font-size: 11px; line-height: 1.35; }

    .source-toggle {
      height: 28px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 0;
      border: 0;
      background: transparent;
      color: var(--text);
      cursor: pointer;
      font-size: 12px;
      font-weight: 700;
    }

    .switch {
      position: relative;
      width: 38px;
      height: 20px;
      display: inline-flex;
      border: 1px solid var(--line-strong);
      background: var(--surface);
    }

    .switch::after {
      content: "";
      position: absolute;
      top: 2px;
      left: 2px;
      width: 14px;
      height: 14px;
      background: var(--line-strong);
      transition: transform 120ms ease, background 120ms ease;
    }

    .source-toggle[aria-pressed="true"] .switch {
      border-color: var(--accent);
      background: var(--accent-soft);
    }

    .source-toggle[aria-pressed="true"] .switch::after {
      transform: translateX(18px);
      background: var(--accent);
    }

    .source-body,
    .preview-body {
      padding: 14px;
      line-height: 1.75;
      font-size: 14px;
    }

    .editor {
      flex: 1;
      width: 100%;
      min-height: 0;
      resize: none;
      border: 0;
      outline: none;
      padding: 14px 16px 72px;
      background: #ffffff;
      color: var(--text);
      font-family: "UDEV Gothic", "BIZ UDGothic", Consolas, monospace;
      font-size: 14px;
      line-height: 1.75;
      tab-size: 2;
    }

    .panel-footer {
      height: 28px;
      flex: 0 0 28px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      padding: 0 10px;
      border-top: 1px solid var(--line);
      background: var(--surface-soft);
      color: var(--text-soft);
      font-size: 11px;
      overflow: hidden;
    }

    .footer-text {
      min-width: 0;
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
    }

    .empty {
      padding: 18px 10px;
      color: var(--text-soft);
      font-size: 13px;
    }

    .meta-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      border-top: 1px solid var(--line);
      border-left: 1px solid var(--line);
      margin-bottom: 12px;
    }

    .meta-cell {
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 3px;
      padding: 8px;
      border-right: 1px solid var(--line);
      border-bottom: 1px solid var(--line);
      background: var(--surface);
    }

    .meta-cell strong {
      color: var(--text-soft);
      font-size: 10px;
      font-weight: 700;
    }

    .meta-cell span {
      min-width: 0;
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
      font-size: 12px;
    }

    .markdown h1,
    .markdown h2,
    .markdown h3 {
      margin: 1.2em 0 0.5em;
      line-height: 1.4;
    }
    .markdown h1 { font-size: 1.55em; }
    .markdown h2 { font-size: 1.28em; }
    .markdown h3 { font-size: 1.1em; }
    .markdown p { margin: 0 0 1em; }
    .markdown ul,
    .markdown ol { padding-left: 1.5em; }
    .markdown blockquote {
      margin: 1em 0;
      padding: 0.1em 0 0.1em 1em;
      border-left: 3px solid var(--line-strong);
      color: var(--text-soft);
    }
    .markdown pre {
      padding: 12px;
      overflow: auto;
      background: #0f172a;
      color: #e2e8f0;
    }
    .markdown code {
      font-family: "UDEV Gothic", Consolas, monospace;
      font-size: 0.92em;
    }

    .ogp-card {
      display: flex;
      min-height: 96px;
      max-height: 160px;
      margin: 0.75rem 0;
      overflow: hidden;
      border: 1px solid var(--line);
      background: #ffffff;
      color: inherit !important;
      text-decoration: none !important;
    }

    .ogp-card:hover {
      border-color: var(--line-strong);
      background: #f8fafc;
    }

    .ogp-card-body {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 0.3rem;
      padding: 0.8rem 0.9rem;
      overflow: hidden;
    }

    .ogp-card-domain {
      color: var(--text-soft);
      font-size: 0.68rem;
    }

    .ogp-card-title {
      color: #1e293b;
      font-size: 0.88rem;
      font-weight: 800;
      line-height: 1.4;
      overflow: hidden;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
    }

    .ogp-card-desc {
      margin-top: auto;
      color: var(--text-soft);
      font-size: 0.72rem;
      line-height: 1.4;
      overflow: hidden;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
    }

    .ogp-card-image {
      width: 136px;
      min-width: 136px;
      max-width: 136px;
      object-fit: contain;
      padding: 8px;
      background: var(--surface-soft);
    }
    .affiliate-launcher {
      position: fixed;
      left: 0;
      bottom: 0;
      z-index: 50;
      height: 34px;
      padding: 0 12px;
      border: 1px solid var(--line-strong);
      border-left: 0;
      border-bottom: 0;
      background: var(--surface);
      cursor: pointer;
      font-weight: 800;
    }

    .affiliate-launcher:hover { background: var(--surface-soft); }

    .modal-backdrop {
      position: fixed;
      inset: 0;
      z-index: 80;
      display: none;
      background: rgba(15, 23, 42, 0.35);
    }

    .modal-backdrop.open {
      display: flex;
      align-items: stretch;
      justify-content: flex-end;
    }

    .affiliate-modal {
      width: min(720px, 92vw);
      height: 100vh;
      display: flex;
      flex-direction: column;
      background: var(--surface);
      border-left: 1px solid var(--line);
    }

    .modal-header,
    .modal-footer {
      height: 48px;
      flex: 0 0 48px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      padding: 0 12px;
      border-bottom: 1px solid var(--line);
      background: var(--surface-soft);
    }

    .modal-footer {
      border-top: 1px solid var(--line);
      border-bottom: 0;
    }

    .memo-tabs {
      height: 40px;
      flex: 0 0 40px;
      display: flex;
      align-items: center;
      gap: 0;
      overflow-x: auto;
      border-bottom: 1px solid var(--line);
      background: var(--surface);
    }

    .memo-tab {
      height: 40px;
      padding: 0 12px;
      border: 0;
      border-right: 1px solid var(--line);
      background: var(--surface);
      cursor: pointer;
      font-weight: 700;
    }

    .memo-tab.active {
      background: var(--accent-soft);
      color: var(--accent);
    }

    .affiliate-editor {
      flex: 1;
      min-height: 0;
      width: 100%;
      border: 0;
      outline: none;
      resize: none;
      padding: 14px;
      font-family: "UDEV Gothic", "BIZ UDGothic", Consolas, monospace;
      font-size: 14px;
      line-height: 1.7;
    }

    @media (max-width: 1100px) {
      .workspace { overflow-x: auto; }
      .sidebar { min-width: 260px; }
      .source-panel { min-width: 300px; }
      .editor-panel { min-width: 480px; }
      .preview-panel { min-width: 420px; }
      .status-chip { min-width: 120px; }
    }

    @media (max-width: 760px) {
      .topbar {
        height: auto;
        min-height: 50px;
        flex-wrap: wrap;
        padding: 8px;
      }
      .toolbar {
        width: 100%;
        justify-content: flex-start;
        overflow-x: auto;
      }
      .status-chip {
        max-width: none;
        flex: 1;
      }
    }
  </style>
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <h1 class="brand">Xpost_blog</h1>
      <div class="toolbar">
        <span class="status-chip" id="statusChip">初期化中</span>
        <button type="button" class="tool-button primary" id="saveButton">保存</button>
        <button type="button" class="tool-button" id="noteDraftButton">note下書き</button>
        <button type="button" class="tool-button" id="pipelineButton">Actions実行</button>
        <button type="button" class="icon-button" id="refreshButton" aria-label="再読み込み" title="再読み込み"></button>
      </div>
    </header>

    <main class="workspace" id="mainPanels">
      <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
          <div class="sidebar-title">記事一覧</div>
          <button type="button" class="source-toggle" id="sourceToggle" aria-pressed="true">
            <span>元投稿</span>
            <span class="switch" aria-hidden="true"></span>
          </button>
        </div>
        <div class="content-scroll"><div class="article-list" id="articleList"><div class="empty">読み込み中</div></div></div>
      </aside>
      <div class="resize-handle" id="sidebarHandle" aria-hidden="true"></div>

      <section class="panel source-panel" id="sourcePanel">
        <div class="panel-header">
          <div class="panel-title">元投稿</div>
          <div class="source-links" id="sourceLinks"></div>
        </div>
        <div class="content-scroll source-body markdown" id="sourceBody"><div class="empty">記事を選択してください</div></div>
      </section>
      <div class="resize-handle" id="sourceHandle" aria-hidden="true"></div>

      <section class="panel editor-panel" id="editorPanel">
        <div class="panel-header">
          <div class="panel-title" id="editorTitle">エディター</div>
          <div class="panel-actions">
            <span class="count-chip" id="charCount">0字</span>
            <div class="editor-links" id="editorLinks"></div>
            <button type="button" class="flat-button" id="insertAffiliateButton">アフィ挿入</button>
            <button type="button" class="icon-button" id="copyEditorButton" aria-label="本文コピー" title="本文コピー"></button>
          </div>
        </div>
        <textarea class="editor" id="editor" spellcheck="false" placeholder="記事を選択してください"></textarea>
        <div class="panel-footer">
          <span class="footer-text" id="editorFooter">Ctrl+S / Command+S で保存</span>
          <span class="footer-text" id="dirtyState">未編集</span>
        </div>
      </section>
      <div class="resize-handle" id="editorHandle" aria-hidden="true"></div>

      <section class="panel preview-panel">
        <div class="panel-header">
          <div class="panel-title">プレビュー</div>
          <div class="panel-actions">
            <button type="button" class="icon-button" id="refreshOgpButton" aria-label="OGP更新" title="OGP更新"></button>
            <button type="button" class="icon-button" id="copyPreviewButton" aria-label="プレビューHTMLコピー" title="プレビューHTMLコピー"></button>
          </div>
        </div>
        <div class="content-scroll preview-body markdown" id="preview"><div class="empty">記事を選択してください</div></div>
        <div class="panel-footer"><span class="footer-text" id="previewFooter">OGP待機中</span></div>
      </section>
    </main>
  </div>

  <button type="button" class="affiliate-launcher" id="affiliateLauncher">アフィリンク</button>

  <div class="modal-backdrop" id="affiliateModalBackdrop" aria-hidden="true">
    <section class="affiliate-modal" role="dialog" aria-modal="true" aria-labelledby="affiliateModalTitle">
      <div class="modal-header">
        <strong id="affiliateModalTitle">tech affiliate</strong>
        <div class="panel-actions">
          <button type="button" class="flat-button" id="addMemoButton">MEMO追加</button>
          <button type="button" class="flat-button" id="reloadAffiliateButton">再読込</button>
          <button type="button" class="flat-button" id="closeAffiliateButton">閉じる</button>
        </div>
      </div>
      <div class="memo-tabs" id="memoTabs"></div>
      <textarea class="affiliate-editor" id="affiliateEditor" spellcheck="false"></textarea>
      <div class="modal-footer">
        <span class="footer-text" id="affiliateStatus">未読込</span>
        <div class="panel-actions">
          <button type="button" class="flat-button" id="insertAffiliateFromModalButton">記事末尾に挿入</button>
          <button type="button" class="tool-button primary" id="saveAffiliateButton">保存</button>
        </div>
      </div>
    </section>
  </div>

  <script>
    const API = '/api/xpost-blog';
    const SOURCE_VISIBLE_KEY = 'xpostBlog.sourceVisible';
    const ICONS = {
      refresh: '<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M20 6v5h-5"/><path d="M4 18v-5h5"/><path d="M18.5 9A7 7 0 0 0 6.2 6.2L4 8.5"/><path d="M5.5 15A7 7 0 0 0 17.8 17.8L20 15.5"/></svg>',
      copy: '<svg viewBox="0 0 24 24" aria-hidden="true"><rect x="8" y="8" width="11" height="11"/><path d="M5 15H4a1 1 0 0 1-1-1V5a1 1 0 0 1 1-1h9a1 1 0 0 1 1 1v1"/></svg>',
      x: '<svg viewBox="0 0 24 24" aria-hidden="true"><rect x="4" y="4" width="16" height="16" rx="0"/><text x="12" y="15.5" text-anchor="middle" font-size="10.5" font-weight="900" fill="currentColor" stroke="none" font-family="Arial, sans-serif">X</text></svg>',
      discord: '<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M7 8.5c3.2-1.4 6.8-1.4 10 0"/><path d="M7.5 16.5c2.8 1.3 6.2 1.3 9 0"/><path d="M8 18c-2.4-.6-3.8-1.8-4.6-3.4.5-3.3 1.4-6.1 3.3-8.1 1.3.1 2.2.4 3.2 1"/><path d="M16 7.5c1-.6 1.9-.9 3.2-1 1.9 2 2.8 4.8 3.3 8.1-.8 1.6-2.2 2.8-4.6 3.4"/><path d="M9.5 13h.01"/><path d="M14.5 13h.01"/></svg>',
      onedrive: '<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M8.4 18h9.1a4 4 0 0 0 .7-7.94A6.1 6.1 0 0 0 6.8 8.4 4.8 4.8 0 0 0 8.4 18Z"/></svg>',
      ogp: '<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M10 13a5 5 0 0 0 7.1 0l2-2a5 5 0 0 0-7.1-7.1l-1.1 1.1"/><path d="M14 11a5 5 0 0 0-7.1 0l-2 2a5 5 0 0 0 7.1 7.1l1.1-1.1"/></svg>'
    };

    const state = {
      articles: [],
      selectedArticle: null,
      frontmatterContent: '',
      editorContent: '',
      sourceContent: '',
      sourceMeta: null,
      sourceVisible: localStorage.getItem(SOURCE_VISIBLE_KEY) !== '0',
      dirty: false,
      affiliateMemos: { memo1: '' },
      activeAffiliateKey: 'memo1',
      affiliateDirty: false,
      noteDraftUrls: {},
      ogpCache: Object.create(null),
      ogpRunId: 0,
    };

    const els = {
      mainPanels: document.getElementById('mainPanels'),
      statusChip: document.getElementById('statusChip'),
      articleList: document.getElementById('articleList'),
      sourceToggle: document.getElementById('sourceToggle'),
      sourceBody: document.getElementById('sourceBody'),
      sourceLinks: document.getElementById('sourceLinks'),
      editor: document.getElementById('editor'),
      editorTitle: document.getElementById('editorTitle'),
      editorLinks: document.getElementById('editorLinks'),
      editorFooter: document.getElementById('editorFooter'),
      dirtyState: document.getElementById('dirtyState'),
      charCount: document.getElementById('charCount'),
      preview: document.getElementById('preview'),
      previewFooter: document.getElementById('previewFooter'),
      saveButton: document.getElementById('saveButton'),
      noteDraftButton: document.getElementById('noteDraftButton'),
      pipelineButton: document.getElementById('pipelineButton'),
      refreshButton: document.getElementById('refreshButton'),
      refreshOgpButton: document.getElementById('refreshOgpButton'),
      copyEditorButton: document.getElementById('copyEditorButton'),
      copyPreviewButton: document.getElementById('copyPreviewButton'),
      insertAffiliateButton: document.getElementById('insertAffiliateButton'),
      sidebar: document.getElementById('sidebar'),
      sourcePanel: document.getElementById('sourcePanel'),
      editorPanel: document.getElementById('editorPanel'),
      sidebarHandle: document.getElementById('sidebarHandle'),
      sourceHandle: document.getElementById('sourceHandle'),
      editorHandle: document.getElementById('editorHandle'),
      affiliateLauncher: document.getElementById('affiliateLauncher'),
      affiliateModalBackdrop: document.getElementById('affiliateModalBackdrop'),
      closeAffiliateButton: document.getElementById('closeAffiliateButton'),
      reloadAffiliateButton: document.getElementById('reloadAffiliateButton'),
      saveAffiliateButton: document.getElementById('saveAffiliateButton'),
      addMemoButton: document.getElementById('addMemoButton'),
      memoTabs: document.getElementById('memoTabs'),
      affiliateEditor: document.getElementById('affiliateEditor'),
      affiliateStatus: document.getElementById('affiliateStatus'),
      insertAffiliateFromModalButton: document.getElementById('insertAffiliateFromModalButton'),
    };

    function initIcons() {
      els.refreshButton.innerHTML = ICONS.refresh;
      els.refreshOgpButton.innerHTML = ICONS.ogp;
      els.copyEditorButton.innerHTML = ICONS.copy;
      els.copyPreviewButton.innerHTML = ICONS.copy;
    }

    function setStatus(message, isError = false) {
      els.statusChip.textContent = message;
      els.statusChip.title = message;
      els.statusChip.style.color = isError ? 'var(--danger)' : 'var(--text-soft)';
      els.statusChip.style.borderLeftColor = isError ? 'var(--danger)' : 'var(--accent)';
    }

    function setAffiliateStatus(message, isError = false) {
      els.affiliateStatus.textContent = message;
      els.affiliateStatus.style.color = isError ? 'var(--danger)' : 'var(--text-soft)';
    }

    function escapeHtml(text) {
      return String(text || '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function apiUrl(resource, params = {}) {
      const url = new URL(API, window.location.origin);
      url.searchParams.set('resource', resource);
      Object.entries(params).forEach(([key, value]) => {
        if (value !== undefined && value !== null && value !== '') {
          url.searchParams.set(key, value);
        }
      });
      return url.toString();
    }
    function renderMarkdown(text) {
      if (!text || !String(text).trim()) {
        return '<div class="empty">表示する内容がありません</div>';
      }
      if (window.marked?.parse) {
        return marked.parse(text, { breaks: true, gfm: true });
      }
      return `<pre>${escapeHtml(text)}</pre>`;
    }

    function composeMarkdownDocument(frontmatter, body) {
      const normalizedBody = String(body || '').trim();
      const normalizedFrontmatter = String(frontmatter || '').trim();
      if (!normalizedFrontmatter) return normalizedBody;
      return normalizedBody ? `${normalizedFrontmatter}\n\n${normalizedBody}\n` : `${normalizedFrontmatter}\n`;
    }

    function articleTitle(article) {
      return article?.h1Title || String(article?.name || '').replace(/\.md$/i, '') || '無題';
    }

    function formatDate(value) {
      if (!value) return '';
      const date = new Date(value);
      if (Number.isNaN(date.getTime())) return '';
      return new Intl.DateTimeFormat('ja-JP', {
        month: '2-digit',
        day: '2-digit',
        hour: '2-digit',
        minute: '2-digit',
      }).format(date);
    }

    function iconLink(href, label, iconName) {
      const safeLabel = escapeHtml(label);
      const icon = ICONS[iconName] || '';
      if (!href) {
        return `<a class="icon-link" aria-disabled="true" aria-label="${safeLabel}" title="${safeLabel}">${icon}</a>`;
      }
      return `<a class="icon-link" href="${escapeHtml(href)}" target="_blank" rel="noreferrer" aria-label="${safeLabel}" title="${safeLabel}">${icon}</a>`;
    }

    function setSourceVisible(visible) {
      state.sourceVisible = Boolean(visible);
      localStorage.setItem(SOURCE_VISIBLE_KEY, state.sourceVisible ? '1' : '0');
      els.mainPanels.classList.toggle('source-hidden', !state.sourceVisible);
      els.sourceToggle.setAttribute('aria-pressed', state.sourceVisible ? 'true' : 'false');
    }

    function renderArticleList() {
      if (!state.articles.length) {
        els.articleList.innerHTML = '<div class="empty">記事がありません</div>';
        return;
      }

      els.articleList.innerHTML = state.articles.map((article) => {
        const isActive = state.selectedArticle?.id === article.id;
        const meta = [article.path || '', formatDate(article.lastModified)].filter(Boolean).join(' / ');
        return `
          <button type="button" class="article-row ${isActive ? 'active' : ''}" data-article-id="${escapeHtml(article.id)}">
            <span class="article-title">${escapeHtml(articleTitle(article))}</span>
            <span class="article-meta">${escapeHtml(meta || article.name)}</span>
          </button>
        `;
      }).join('');

      els.articleList.querySelectorAll('[data-article-id]').forEach((button) => {
        button.addEventListener('click', () => {
          const article = state.articles.find((item) => item.id === button.dataset.articleId);
          if (article) selectArticle(article).catch((error) => setStatus(error.message, true));
        });
      });
    }

    function renderSourcePanel() {
      const item = state.sourceMeta;
      if (!item) {
        els.sourceLinks.innerHTML = '';
        els.sourceBody.innerHTML = '<div class="empty">元投稿がありません</div>';
        return;
      }

      const stats = [
        ['投稿者', item.authorName || item.authorUsername || '-'],
        ['いいね', item.favoriteCount ?? item.likeCount ?? 0],
        ['リポスト', item.repostCount ?? item.retweetCount ?? 0],
        ['状態', item.articleStatus || item.status || '-'],
      ];

      els.sourceLinks.innerHTML = [
        iconLink(item.postUrl || item.xUrl || item.url, 'Xを開く', 'x'),
        iconLink(item.discordJumpUrl || item.discordUrl, 'Discordを開く', 'discord'),
      ].join('');

      els.sourceBody.innerHTML = `
        <div class="meta-grid">
          ${stats.map(([label, value]) => `
            <div class="meta-cell">
              <strong>${escapeHtml(label)}</strong>
              <span>${escapeHtml(String(value))}</span>
            </div>
          `).join('')}
        </div>
        <div class="markdown">${renderMarkdown(state.sourceContent)}</div>
      `;
    }

    function renderEditorLinks() {
      const articleUrl = state.sourceMeta?.articleWebUrl || state.selectedArticle?.webUrl || '';
      els.editorLinks.innerHTML = iconLink(articleUrl, 'OneDrive記事', 'onedrive');
    }

    function updateEditorMeta() {
      const count = els.editor.value.length;
      els.charCount.textContent = `${count.toLocaleString('ja-JP')}字`;
      els.dirtyState.textContent = state.dirty ? '未保存' : '保存済み';
      els.editorFooter.textContent = state.selectedArticle ? `${state.selectedArticle.name}` : 'Ctrl+S / Command+S で保存';
    }

    function renderPreview(forceOgp = false) {
      state.editorContent = els.editor.value;
      els.preview.innerHTML = renderMarkdown(state.editorContent);
      updateEditorMeta();
      queueOgpCards(forceOgp);
    }
    async function fetchArticles() {
      setStatus('記事一覧を取得中');
      const previousId = state.selectedArticle?.id;
      const response = await fetch(apiUrl('articles'), { cache: 'no-store' });
      if (!response.ok) throw new Error('記事一覧の取得に失敗しました');
      const data = await response.json();
      state.articles = data.articles || [];
      state.selectedArticle = previousId ? state.articles.find((article) => article.id === previousId) || null : null;
      renderArticleList();
      setStatus(`記事一覧 ${state.articles.length}件`);
      if (!state.selectedArticle && state.articles[0]) {
        await selectArticle(state.articles[0]);
      } else if (state.selectedArticle) {
        await selectArticle(state.selectedArticle);
      }
    }

    async function selectArticle(article) {
      state.selectedArticle = article;
      state.dirty = false;
      renderArticleList();
      renderEditorLinks();
      els.editorTitle.textContent = articleTitle(article);
      setStatus('記事本文を取得中');

      const [articleResponse, sourceResponse] = await Promise.all([
        fetch(apiUrl('articles', { id: article.id }), { cache: 'no-store' }),
        fetch(apiUrl('index', { articleId: article.id }), { cache: 'no-store' }),
      ]);

      if (!articleResponse.ok) throw new Error('記事本文の取得に失敗しました');
      const articleData = await articleResponse.json();
      state.frontmatterContent = articleData.frontmatter || '';
      state.editorContent = articleData.body || articleData.content || '';
      els.editor.value = state.editorContent;

      if (sourceResponse.ok) {
        const sourceData = await sourceResponse.json();
        state.sourceMeta = sourceData.item || null;
        state.sourceContent = sourceData.sourceContent || '';
      } else {
        state.sourceMeta = null;
        state.sourceContent = '';
      }

      renderSourcePanel();
      renderEditorLinks();
      renderPreview(false);
      setStatus(articleTitle(article));
    }

    async function saveCurrentArticle() {
      if (!state.selectedArticle) {
        setStatus('保存対象の記事が未選択です', true);
        return false;
      }

      setStatus('保存中');
      const response = await fetch(apiUrl('articles'), {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          filename: state.selectedArticle.name,
          fileId: state.selectedArticle.id,
          content: composeMarkdownDocument(state.frontmatterContent, els.editor.value),
        }),
      });

      if (!response.ok) {
        const payload = await response.json().catch(() => ({}));
        throw new Error(payload.error || '保存に失敗しました');
      }

      const payload = await response.json();
      state.selectedArticle = {
        ...state.selectedArticle,
        id: payload.id || state.selectedArticle.id,
        name: payload.name || state.selectedArticle.name,
        webUrl: payload.webUrl || state.selectedArticle.webUrl,
        lastModified: payload.lastModified || new Date().toISOString(),
      };
      state.dirty = false;
      updateEditorMeta();
      renderEditorLinks();
      renderArticleList();
      setStatus('保存しました');
      return true;
    }

    async function triggerPipeline() {
      setStatus('Actions実行中');
      const response = await fetch(apiUrl('trigger'), {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ mode: 'full_pipeline' }),
      });
      const payload = await response.json().catch(() => ({}));
      if (!response.ok) throw new Error(payload.error || 'Actions実行に失敗しました');
      setStatus(payload.message || 'Actionsを実行しました');
    }

    async function triggerNoteDraft() {
      if (!state.selectedArticle) {
        setStatus('note下書き対象の記事が未選択です', true);
        return;
      }

      if (state.dirty) {
        const saved = await saveCurrentArticle();
        if (!saved) return;
      }

      setStatus('note下書きを起動中');
      const fileId = state.selectedArticle.id;
      const response = await fetch('/api/note-draft', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ fileId, noTopImage: true }),
      });
      const payload = await response.json().catch(() => ({}));
      if (!response.ok || payload.success === false) {
        throw new Error(payload.error || payload.message || 'note下書きの起動に失敗しました');
      }
      setStatus('note下書きを実行中。URLを確認します');
      await pollNoteDraftUrl(fileId);
    }

    async function pollNoteDraftUrl(fileId) {
      for (let attempt = 0; attempt < 24; attempt += 1) {
        const response = await fetch(`/api/note-draft?fileId=${encodeURIComponent(fileId)}`, { cache: 'no-store' });
        if (response.ok) {
          const payload = await response.json().catch(() => ({}));
          if (payload.url) {
            state.noteDraftUrls[fileId] = payload.url;
            setStatus(`note下書きURL: ${payload.url}`);
            window.open(payload.url, '_blank', 'noopener,noreferrer');
            return payload.url;
          }
        }
        await new Promise((resolve) => setTimeout(resolve, 5000));
      }
      setStatus('note下書きは実行中です。Actions完了後に再確認してください');
      return null;
    }

    async function copyText(text, doneMessage) {
      await navigator.clipboard.writeText(text);
      setStatus(doneMessage);
    }
    function buildOgpCard(href, title, description, image, domain) {
      const card = document.createElement('a');
      card.className = 'ogp-card';
      card.href = href;
      card.target = '_blank';
      card.rel = 'noopener noreferrer';
      card.innerHTML = [
        '<div class="ogp-card-body">',
        domain ? `<div class="ogp-card-domain">${escapeHtml(domain)}</div>` : '',
        title ? `<div class="ogp-card-title">${escapeHtml(title)}</div>` : '',
        description ? `<div class="ogp-card-desc">${escapeHtml(description)}</div>` : '',
        '</div>',
        image ? `<img class="ogp-card-image" src="${escapeHtml(image)}" alt="" loading="lazy" onerror="this.style.display='none'" />` : '',
      ].join('');
      return card;
    }

    function insertOgpCard(anchor, card) {
      if (!anchor?.isConnected || anchor.classList.contains('ogp-card')) return;
      if (anchor.nextElementSibling?.classList?.contains('ogp-card')) return;
      anchor.insertAdjacentElement('afterend', card);
    }

    function normalizeUrlForOgp(href) {
      try {
        const url = new URL(href);
        if (!/^https?:$/.test(url.protocol)) return '';
        return url.toString();
      } catch {
        return '';
      }
    }

    function queueOgpCards(force = false) {
      const runId = ++state.ogpRunId;
      els.previewFooter.textContent = 'OGP待機中';
      window.requestAnimationFrame(() => applyOgpCards(runId, force));
    }

    async function applyOgpCards(runId, force = false) {
      const links = [...els.preview.querySelectorAll('a[href^="http"]:not(.ogp-card)')]
        .map((anchor) => ({ anchor, href: normalizeUrlForOgp(anchor.href) }))
        .filter((entry) => entry.href);

      if (!links.length) {
        els.previewFooter.textContent = 'OGP対象なし';
        return;
      }

      if (force) {
        links.forEach(({ anchor }) => anchor.removeAttribute('data-ogp-processed'));
      }

      let processed = 0;
      for (const { anchor, href } of links) {
        if (runId !== state.ogpRunId) return;
        if (!anchor.isConnected || anchor.dataset.ogpProcessed) continue;
        anchor.dataset.ogpProcessed = '1';

        try {
          let ogp = state.ogpCache[href];
          if (!ogp || force) {
            const response = await fetch(`/api/ogp?url=${encodeURIComponent(href)}`, { cache: 'no-store' });
            if (!response.ok) throw new Error(`OGP ${response.status}`);
            ogp = await response.json();
            state.ogpCache[href] = ogp;
          }
          const domain = ogp.domain || new URL(href).hostname;
          insertOgpCard(anchor, buildOgpCard(href, ogp.title || href, ogp.description || '', ogp.image || '', domain));
          processed += 1;
          els.previewFooter.textContent = `OGP ${processed}/${links.length}`;
        } catch {
          anchor.removeAttribute('data-ogp-processed');
          const domain = new URL(href).hostname;
          insertOgpCard(anchor, buildOgpCard(href, domain, '', '', domain));
        }
      }

      els.previewFooter.textContent = processed ? `OGP展開 ${processed}件` : 'OGP対象なし';
    }

    function refreshOgp() {
      els.preview.querySelectorAll('.ogp-card').forEach((card) => card.remove());
      els.preview.querySelectorAll('a[data-ogp-processed]').forEach((anchor) => anchor.removeAttribute('data-ogp-processed'));
      renderPreview(true);
      setStatus('OGPを更新します');
    }

    function memoKeys() {
      return Object.keys(state.affiliateMemos)
        .sort((a, b) => Number(a.replace('memo', '')) - Number(b.replace('memo', '')));
    }

    function renderMemoTabs() {
      const keys = memoKeys();
      if (!keys.includes(state.activeAffiliateKey)) state.activeAffiliateKey = keys[0] || 'memo1';
      els.memoTabs.innerHTML = keys.map((key) => `
        <button type="button" class="memo-tab ${key === state.activeAffiliateKey ? 'active' : ''}" data-memo-key="${escapeHtml(key)}">
          ${escapeHtml(key.toUpperCase())}
        </button>
      `).join('');
      els.memoTabs.querySelectorAll('[data-memo-key]').forEach((button) => {
        button.addEventListener('click', () => {
          syncAffiliateEditorToState();
          state.activeAffiliateKey = button.dataset.memoKey;
          els.affiliateEditor.value = state.affiliateMemos[state.activeAffiliateKey] || '';
          renderMemoTabs();
        });
      });
    }

    function syncAffiliateEditorToState() {
      if (!state.activeAffiliateKey) return;
      state.affiliateMemos[state.activeAffiliateKey] = els.affiliateEditor.value;
    }

    async function fetchAffiliateMemos() {
      setAffiliateStatus('読み込み中');
      const response = await fetch(apiUrl('affiliate'), { cache: 'no-store' });
      if (!response.ok) throw new Error('tech affiliateの取得に失敗しました');
      const payload = await response.json();
      state.affiliateMemos = payload.memos || { memo1: '' };
      state.activeAffiliateKey = memoKeys()[0] || 'memo1';
      state.affiliateDirty = false;
      renderMemoTabs();
      els.affiliateEditor.value = state.affiliateMemos[state.activeAffiliateKey] || '';
      setAffiliateStatus('読み込みました');
    }

    async function saveAffiliateMemos() {
      syncAffiliateEditorToState();
      setAffiliateStatus('保存中');
      const response = await fetch(apiUrl('affiliate'), {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ memos: state.affiliateMemos }),
      });
      if (!response.ok) throw new Error('tech affiliateの保存に失敗しました');
      state.affiliateDirty = false;
      setAffiliateStatus('保存しました');
    }

    function openAffiliateModal() {
      els.affiliateModalBackdrop.classList.add('open');
      els.affiliateModalBackdrop.setAttribute('aria-hidden', 'false');
      if (!memoKeys().length || (memoKeys().length === 1 && state.affiliateMemos.memo1 === '')) {
        fetchAffiliateMemos().catch((error) => setAffiliateStatus(error.message, true));
      } else {
        renderMemoTabs();
        els.affiliateEditor.value = state.affiliateMemos[state.activeAffiliateKey] || '';
      }
      els.affiliateEditor.focus();
    }

    function closeAffiliateModal() {
      syncAffiliateEditorToState();
      els.affiliateModalBackdrop.classList.remove('open');
      els.affiliateModalBackdrop.setAttribute('aria-hidden', 'true');
    }

    function addMemo() {
      syncAffiliateEditorToState();
      const nums = memoKeys().map((key) => Number(key.replace('memo', ''))).filter(Boolean);
      const next = `memo${Math.max(0, ...nums) + 1}`;
      state.affiliateMemos[next] = '';
      state.activeAffiliateKey = next;
      state.affiliateDirty = true;
      renderMemoTabs();
      els.affiliateEditor.value = '';
      els.affiliateEditor.focus();
    }

    function activeAffiliateText() {
      syncAffiliateEditorToState();
      return String(state.affiliateMemos[state.activeAffiliateKey] || '').trim();
    }

    function insertAffiliateAtEnd() {
      const text = activeAffiliateText();
      if (!text) {
        setStatus('挿入するアフィリエイトテキストが空です', true);
        return;
      }
      if (!state.selectedArticle) {
        setStatus('記事が未選択です', true);
        return;
      }
      const current = els.editor.value.trimEnd();
      els.editor.value = current.includes(text) ? current : `${current}\n\n---\n\n${text}\n`;
      state.dirty = true;
      renderPreview(false);
      setStatus(`${state.activeAffiliateKey.toUpperCase()}を記事末尾へ挿入しました`);
    }
    function applyResizer(handle, target, cssVar, minPx, maxPx) {
      handle.addEventListener('pointerdown', (event) => {
        handle.classList.add('dragging');
        const startX = event.clientX;
        const startWidth = target.getBoundingClientRect().width;

        function onMove(moveEvent) {
          const nextWidth = Math.min(Math.max(startWidth + (moveEvent.clientX - startX), minPx), maxPx);
          document.documentElement.style.setProperty(cssVar, `${nextWidth}px`);
        }

        function onUp() {
          handle.classList.remove('dragging');
          window.removeEventListener('pointermove', onMove);
          window.removeEventListener('pointerup', onUp);
        }

        window.addEventListener('pointermove', onMove);
        window.addEventListener('pointerup', onUp);
      });
    }

    function applyEditorResizer(handle) {
      handle.addEventListener('pointerdown', (event) => {
        handle.classList.add('dragging');
        const container = handle.parentElement;
        const startX = event.clientX;
        const startWidth = els.editorPanel.getBoundingClientRect().width;
        const totalWidth = container.getBoundingClientRect().width || window.innerWidth;

        function onMove(moveEvent) {
          const nextWidth = Math.min(Math.max(startWidth + (moveEvent.clientX - startX), 420), Math.max(460, totalWidth - 360));
          const percent = (nextWidth / totalWidth) * 100;
          document.documentElement.style.setProperty('--editor-width', `${percent}%`);
        }

        function onUp() {
          handle.classList.remove('dragging');
          window.removeEventListener('pointermove', onMove);
          window.removeEventListener('pointerup', onUp);
        }

        window.addEventListener('pointermove', onMove);
        window.addEventListener('pointerup', onUp);
      });
    }

    function bindEvents() {
      els.saveButton.addEventListener('click', () => saveCurrentArticle().catch((error) => setStatus(error.message, true)));
      els.noteDraftButton.addEventListener('click', () => triggerNoteDraft().catch((error) => setStatus(error.message, true)));
      els.pipelineButton.addEventListener('click', () => triggerPipeline().catch((error) => setStatus(error.message, true)));
      els.refreshButton.addEventListener('click', () => fetchArticles().catch((error) => setStatus(error.message, true)));
      els.refreshOgpButton.addEventListener('click', refreshOgp);
      els.copyEditorButton.addEventListener('click', () => copyText(els.editor.value, '本文をコピーしました').catch((error) => setStatus(error.message, true)));
      els.copyPreviewButton.addEventListener('click', () => copyText(els.preview.innerHTML, 'プレビューHTMLをコピーしました').catch((error) => setStatus(error.message, true)));
      els.insertAffiliateButton.addEventListener('click', insertAffiliateAtEnd);
      els.sourceToggle.addEventListener('click', () => setSourceVisible(!state.sourceVisible));

      els.editor.addEventListener('input', () => {
        state.dirty = true;
        renderPreview(false);
      });

      window.addEventListener('keydown', (event) => {
        const isSaveShortcut = (event.ctrlKey || event.metaKey) && event.key.toLowerCase() === 's';
        if (!isSaveShortcut) return;
        event.preventDefault();
        saveCurrentArticle().catch((error) => setStatus(error.message, true));
      });

      els.affiliateLauncher.addEventListener('click', openAffiliateModal);
      els.closeAffiliateButton.addEventListener('click', closeAffiliateModal);
      els.affiliateModalBackdrop.addEventListener('click', (event) => {
        if (event.target === els.affiliateModalBackdrop) closeAffiliateModal();
      });
      els.reloadAffiliateButton.addEventListener('click', () => fetchAffiliateMemos().catch((error) => setAffiliateStatus(error.message, true)));
      els.saveAffiliateButton.addEventListener('click', () => saveAffiliateMemos().catch((error) => setAffiliateStatus(error.message, true)));
      els.addMemoButton.addEventListener('click', addMemo);
      els.insertAffiliateFromModalButton.addEventListener('click', insertAffiliateAtEnd);
      els.affiliateEditor.addEventListener('input', () => {
        state.affiliateDirty = true;
        syncAffiliateEditorToState();
        setAffiliateStatus('未保存');
      });

      applyResizer(els.sidebarHandle, els.sidebar, '--sidebar-width', 240, 520);
      applyResizer(els.sourceHandle, els.sourcePanel, '--source-width', 260, 560);
      applyEditorResizer(els.editorHandle);
    }

    async function init() {
      initIcons();
      bindEvents();
      setSourceVisible(state.sourceVisible);
      updateEditorMeta();
      await Promise.all([
        fetchArticles(),
        fetchAffiliateMemos().catch((error) => setAffiliateStatus(error.message, true)),
      ]);
    }

    init().catch((error) => setStatus(error.message, true));
  </script>
</body>
</html>
